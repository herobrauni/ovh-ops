---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: niks3
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: niks3-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        api-token: "{{ .API_TOKEN }}"
        signing-key: "{{ .SIGNING_KEY }}"
  data:
    - secretKey: API_TOKEN
      remoteRef:
        key: /niks3/API_TOKEN
    - secretKey: SIGNING_KEY
      remoteRef:
        key: /niks3/SIGNING_KEY
