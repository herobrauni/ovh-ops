---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: karakeep
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  target:
    name: karakeep-secret
    creationPolicy: Owner
    template:
      data:
        NEXTAUTH_SECRET: "{{ .NEXTAUTH_SECRET }}"
        MEILI_MASTER_KEY: "{{ .MEILI_MASTER_KEY }}"
        OPENAI_API_KEY: "{{ .KILO_API_KEY }}"
        OPENAI_BASE_URL: "https://api.kilo.ai/api/gateway"
        INFERENCE_TEXT_MODEL: "openrouter/free"
        INFERENCE_IMAGE_MODEL: "openrouter/free"
  dataFrom:
    - extract:
        key: karakeep