---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
data:
  settings.yaml: |
    title: ovh-ops
    theme: dark
    color: slate
    headerStyle: clean
    statusStyle: dot
    useEqualHeights: false
    fiveColumns: true
    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: true
      showSearchSuggestions: true
      hideVisitURL: true
    layout:
      Selfhosted:
        style: column
        icon: mdi-home
      Media:
        style: column
        icon: mdi-play-box-multiple
      Observability:
        style: column
        icon: mdi-chart-areaspline
      Platform:
        style: column
        icon: mdi-kubernetes
      Development:
        style: column
        icon: mdi-source-pull
      Network:
        style: column
        icon: mdi-router-network

  widgets.yaml: |
    - search:
        provider: [google]
        focus: false
        target: _blank
    - kubernetes:
        cluster:
          cpu: true
          memory: true
          show: true
          showLabel: true
        nodes:
          cpu: true
          memory: true
          show: true
          showLabel: true

  services.yaml: |
    - Selfhosted:
        - OpenCloud:
            href: https://opencloud.brauni.dev
            siteMonitor: https://opencloud.brauni.dev
            icon: https://opencloud.brauni.dev/themes/opencloud/assets/logo.svg
        - Open WebUI:
            href: https://open-webui.brauni.dev
            siteMonitor: https://open-webui.brauni.dev
            icon: mdi-robot-outline
        - Immich:
            href: https://immich.brauni.dev
            siteMonitor: https://immich.brauni.dev
            icon: immich.png
        - Hoarder:
            href: https://hoarder.brauni.dev
            siteMonitor: https://hoarder.brauni.dev
            icon: hoarder.png
        - Paperless:
            href: https://paperless.brauni.dev
            siteMonitor: https://paperless.brauni.dev
            icon: paperless.png
        - Idlers:
            href: https://idlers.brauni.dev
            siteMonitor: https://idlers.brauni.dev
            icon: mdi-application-cog
        - Atuin:
            href: https://atuin.brauni.dev
            siteMonitor: https://atuin.brauni.dev
            icon: mdi-console-line
        - Firefly III:
            href: https://firefly3.brauni.dev
            siteMonitor: https://firefly3.brauni.dev
            icon: mdi-cash-multiple

    - Media:
        - Bitmagnet:
            href: https://bitmagnet.brauni.dev
            siteMonitor: https://bitmagnet.brauni.dev
            icon: mdi-magnet
        - Cleanuparr:
            href: https://cleanuparr.brauni.dev
            siteMonitor: https://cleanuparr.brauni.dev
            icon: mdi-broom
        - Comet:
            href: https://comet.brauni.dev
            siteMonitor: https://comet.brauni.dev
            icon: mdi-comet
        - BookLore:
            href: https://booklore.brauni.dev
            siteMonitor: https://booklore.brauni.dev
            icon: mdi-book-open-variant
        - Shelfmark:
            href: https://shelfmark.brauni.dev
            siteMonitor: https://shelfmark.brauni.dev
            icon: mdi-bookshelf
        - Plex:
            href: https://plex.brauni.dev
            siteMonitor: https://plex.brauni.dev
            icon: plex.png
        - Radarr:
            href: https://radarr.brauni.dev
            siteMonitor: https://radarr.brauni.dev
            icon: radarr.png
        - Radarr 4K:
            href: https://radarr4k.brauni.dev
            siteMonitor: https://radarr4k.brauni.dev
            icon: radarr.png
        - Sonarr:
            href: https://sonarr.brauni.dev
            siteMonitor: https://sonarr.brauni.dev
            icon: sonarr.png
        - Sonarr 4K:
            href: https://sonarr4k.brauni.dev
            siteMonitor: https://sonarr4k.brauni.dev
            icon: sonarr.png
        - Decypharr:
            href: https://decypharr.riki.boo
            siteMonitor: https://decypharr.riki.boo
            icon: mdi-magnet
        - Profilarr:
            href: https://profilarr.brauni.dev
            siteMonitor: https://profilarr.brauni.dev
            icon: mdi-format-list-checks
        - NewtArr:
            href: https://newtarr.brauni.dev
            siteMonitor: https://newtarr.brauni.dev
            icon: mdi-new-box
        - Prowlarr:
            href: https://prowlarr.brauni.dev
            siteMonitor: https://prowlarr.brauni.dev
            icon: prowlarr.png
        - Seerr:
            href: https://requests.brauni.dev
            siteMonitor: https://requests.brauni.dev
            icon: mdi-television-guide

    - Observability:
        - Grafana:
            href: https://grafana.riki.boo
            siteMonitor: https://grafana.riki.boo
            icon: grafana.png
        - Alertmanager:
            href: https://alertmanager.riki.boo
            siteMonitor: https://alertmanager.riki.boo
            icon: alertmanager.png
        - Prometheus:
            href: https://prometheus.riki.boo
            siteMonitor: https://prometheus.riki.boo
            icon: prometheus.png
        - Victoria Logs:
            href: https://victoria-logs.riki.boo
            siteMonitor: https://victoria-logs.riki.boo
            icon: victoriametrics.png
        - Status:
            href: https://status.riki.boo
            siteMonitor: https://status.riki.boo
            icon: gatus.png

    - Platform:
        - KGuardian:
            href: https://kguardian.riki.boo
            siteMonitor: https://kguardian.riki.boo
            icon: mdi-shield-check
        - Flux Operator:
            href: https://flux-operator.riki.boo
            siteMonitor: https://flux-operator.riki.boo
            icon: flux-cd.png
        - Kopia:
            href: https://kopia.riki.boo
            siteMonitor: https://kopia.riki.boo
            icon: mdi-folder-sync

    - Development:
        - ovh-ops Pull Requests:
            href: https://github.com/herobrauni/ovh-ops/pulls
            icon: github-light.png
            description: Open pull requests
            widget:
              type: customapi
              url: https://api.github.com/repos/herobrauni/ovh-ops/pulls?state=open&sort=updated&direction=desc&per_page=5
              headers:
                User-Agent: homepage-dashboard
                Accept: application/vnd.github+json
              refreshInterval: 300000
              display: dynamic-list
              mappings:
                name: title
                label: updated_at
                format: relativeDate
                target: https://github.com/herobrauni/ovh-ops/pull/{number}

    - Network:
        - TinyAuth (riki.boo):
            href: https://auth.riki.boo
            siteMonitor: https://auth.riki.boo
            icon: mdi-lock-check
        - TinyAuth (brauni.eu):
            href: https://auth.brauni.eu
            siteMonitor: https://auth.brauni.eu
            icon: mdi-lock-check
        - TinyAuth (brauni.dev):
            href: https://auth.brauni.dev
            siteMonitor: https://auth.brauni.dev
            icon: mdi-lock-check

  bookmarks.yaml: |
    - Ops:
        - GitHub:
            - icon: github.png
              href: https://github.com/herobrauni/ovh-ops

  custom.css: |

  custom.js: |

  docker.yaml: ""

  proxmox.yaml: ""

  kubernetes.yaml: |
    mode: cluster
