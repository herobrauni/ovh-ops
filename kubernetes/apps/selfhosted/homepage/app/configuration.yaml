---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
data:
  settings.yaml: |
    title: ovh-ops
    theme: dark
    color: slate
    headerStyle: clean
    statusStyle: dot
    useEqualHeights: true
    fiveColumns: false
    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: true
      showSearchSuggestions: true
      hideVisitURL: true
    layout:
      Selfhosted:
        style: column
        icon: mdi-home
      Tools:
        style: column
        icon: mdi-tools
      Media:
        style: column
        icon: mdi-play-box-multiple
      Observability:
        style: column
        icon: mdi-chart-areaspline
      Platform:
        style: column
        icon: mdi-kubernetes
      Development:
        style: column
        icon: mdi-source-pull
      Network:
        style: column
        icon: mdi-router-network

  widgets.yaml: |
    - search:
        provider: [google]
        focus: false
        target: _blank
    - kubernetes:
        cluster:
          cpu: true
          memory: true
          show: true
          showLabel: true
        nodes:
          cpu: true
          memory: true
          show: true
          showLabel: true

  services.yaml: |
    - Selfhosted:
        - PatchMon:
            href: https://patchmon.riki.boo
            icon: mdi-package-up
            description: Patching overview
            widget:
              type: customapi
              url: https://patchmon.riki.boo/api/v1/gethomepage/stats
              headers:
                Authorization: "{{HOMEPAGE_VAR_PATCHMON_AUTH_HEADER}}"
              mappings:
                - field: total_hosts
                  label: Total Hosts
                - field: hosts_needing_updates
                  label: Needs Updates
                - field: security_updates
                  label: Security Updates
                - field: recent_updates_24h
                  label: Updated (24h)
    - Development:
        - ovh-ops Pull Requests:
            href: https://github.com/herobrauni/ovh-ops/pulls
            icon: github-light.png
            description: Open pull requests
            widget:
              type: customapi
              url: https://api.github.com/repos/herobrauni/ovh-ops/pulls?state=open&sort=updated&direction=desc&per_page=5
              headers:
                User-Agent: homepage-dashboard
                Accept: application/vnd.github+json
              refreshInterval: 300000
              display: dynamic-list
              mappings:
                name: title
                label: updated_at
                format: relativeDate
                target: https://github.com/herobrauni/ovh-ops/pull/{number}
  bookmarks.yaml: |
    - Ops:
        - GitHub:
            - icon: github.png
              href: https://github.com/herobrauni/ovh-ops

  custom.css: |
    body {
      background: radial-gradient(circle at top, rgba(56, 189, 248, 0.10), transparent 40%), #0b1220;
    }

    .service-card,
    .bookmark-card,
    .widget,
    .information-widget {
      border-radius: 16px !important;
      border: 1px solid rgba(148, 163, 184, 0.18) !important;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35) !important;
      backdrop-filter: blur(8px);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .service-card:hover,
    .bookmark-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.45) !important;
    }

    h1, h2, h3 {
      letter-spacing: 0.2px;
    }

    .status {
      font-weight: 600;
    }

  custom.js: |

  docker.yaml: ""

  proxmox.yaml: ""

  kubernetes.yaml: |
    mode: cluster
    gateway: true
