---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
data:
  settings.yaml: |
    title: ovh-ops
    theme: dark
    color: slate
    headerStyle: clean
    statusStyle: dot
    useEqualHeights: false
    fiveColumns: true
    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: true
      showSearchSuggestions: true
      hideVisitURL: true
    layout:
      Selfhosted:
        style: column
        icon: mdi-home
      Tools:
        style: column
        icon: mdi-tools
      Media:
        style: column
        icon: mdi-play-box-multiple
      Observability:
        style: column
        icon: mdi-chart-areaspline
      Platform:
        style: column
        icon: mdi-kubernetes
      Development:
        style: column
        icon: mdi-source-pull
      Network:
        style: column
        icon: mdi-router-network

  widgets.yaml: |
    - search:
        provider: [google]
        focus: false
        target: _blank
    - kubernetes:
        cluster:
          cpu: true
          memory: true
          show: true
          showLabel: true
        nodes:
          cpu: true
          memory: true
          show: true
          showLabel: true

  services.yaml: |
    - Development:
        - ovh-ops Pull Requests:
            href: https://github.com/herobrauni/ovh-ops/pulls
            icon: github-light.png
            description: Open pull requests
            widget:
              type: customapi
              url: https://api.github.com/repos/herobrauni/ovh-ops/pulls?state=open&sort=updated&direction=desc&per_page=5
              headers:
                User-Agent: homepage-dashboard
                Accept: application/vnd.github+json
              refreshInterval: 300000
              display: dynamic-list
              mappings:
                name: title
                label: updated_at
                format: relativeDate
                target: https://github.com/herobrauni/ovh-ops/pull/{number}
  bookmarks.yaml: |
    - Ops:
        - GitHub:
            - icon: github.png
              href: https://github.com/herobrauni/ovh-ops

  custom.css: |

  custom.js: |

  docker.yaml: ""

  proxmox.yaml: ""

  kubernetes.yaml: |
    mode: cluster
    gateway: true
