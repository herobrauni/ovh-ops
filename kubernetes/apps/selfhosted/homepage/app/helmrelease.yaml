---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
spec:
  chartRef:
    kind: OCIRepository
    name: homepage
  interval: 30m
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      homepage:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/gethomepage/homepage
              tag: v1.13.1@sha256:d8d784e5090111b6e4c56dfd90e272d2953a2094e87349f647165df0fa6c4401
            env:
              HOMEPAGE_ALLOWED_HOSTS: homepage.brauni.dev,home.brauni.dev,homepage.riki.boo,home.riki.boo,homepage.480p.com,home.480p.com
            envFrom:
              - secretRef:
                  name: homepage-secret
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
            resources:
              requests:
                cpu: 15m
                memory: 200Mi
              limits:
                memory: 2Gi

    service:
      app:
        controller: homepage
        ports:
          http:
            port: 3000

    route:
      brauni-dev:
        hostnames:
          - homepage.brauni.dev
          - home.brauni.dev
        parentRefs:
          - name: envoy-brauni-dev-public
            namespace: network
            sectionName: https
      riki-boo:
        hostnames:
          - homepage.riki.boo
          - home.riki.boo
        parentRefs:
          - name: envoy-riki-boo-public
            namespace: network
            sectionName: https
      480p-com:
        hostnames:
          - homepage.480p.com
          - home.480p.com
        parentRefs:
          - name: envoy-480p-com-public
            namespace: network
            sectionName: https

    persistence:
      config:
        type: configMap
        name: homepage-config
        globalMounts:
          - subPath: bookmarks.yaml
            path: /app/config/bookmarks.yaml
          - subPath: custom.css
            path: /app/config/custom.css
          - subPath: custom.js
            path: /app/config/custom.js
          - subPath: docker.yaml
            path: /app/config/docker.yaml
          - subPath: kubernetes.yaml
            path: /app/config/kubernetes.yaml
          - subPath: proxmox.yaml
            path: /app/config/proxmox.yaml
          - subPath: services.yaml
            path: /app/config/services.yaml
          - subPath: settings.yaml
            path: /app/config/settings.yaml
          - subPath: widgets.yaml
            path: /app/config/widgets.yaml
      logs:
        type: emptyDir
        globalMounts:
          - path: /app/config/logs

    serviceAccount:
      homepage: {}
