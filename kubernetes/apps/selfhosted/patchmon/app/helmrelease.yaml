---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app patchmon
spec:
  chartRef:
    kind: OCIRepository
    name: patchmon
  interval: 30m
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    controllers:
      frontend:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/patchmon/patchmon-frontend
              tag: 1.4.2@sha256:002c9c9c1fe36961b0cf45a4b6723a6dafe97fa24ea4e39bd2fcc6b9ab73b71d
            env:
              BACKEND_HOST: patchmon-backend
              BACKEND_PORT: "3001"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 50Mi
              limits:
                memory: 512Mi

      backend:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
          secret.reloader.stakater.com/reload: patchmon-secret,patchmon-pguser-secret
        initContainers:
          01-init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
            envFrom:
              - secretRef:
                  name: patchmon-initdb-secret
        containers:
          app:
            image:
              repository: ghcr.io/patchmon/patchmon-backend
              tag: 1.4.2@sha256:e44e310bf3e4647ae67c7a8a45c60c350fe7954df2809ba2842edf8cb56e9b07
            env:
              SERVER_PROTOCOL: https
              SERVER_HOST: patchmon.riki.boo
              SERVER_PORT: "443"
              CORS_ORIGIN: https://patchmon.riki.boo
              LOG_LEVEL: info
              ENABLE_LOGGING: "true"
              PM_LOG_TO_CONSOLE: "true"
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: patchmon-pguser-secret
                    key: uri
              REDIS_HOST: patchmon-dragonfly
              REDIS_PORT: "6379"
              REDIS_DB: "0"
              TRUST_PROXY: "true"
              ENABLE_HSTS: "true"
              DEFAULT_USER_ROLE: user
              AUTO_CREATE_ROLE_PERMISSIONS: "false"
            envFrom:
              - secretRef:
                  name: patchmon-secret
            probes:
              liveness:
                enabled: true
                spec:
                  httpGet:
                    path: /health
                    port: 3001
              readiness:
                enabled: true
                spec:
                  httpGet:
                    path: /health
                    port: 3001
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
                  httpGet:
                    path: /health
                    port: 3001
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 2Gi

    service:
      app:
        primary: true
        controller: frontend
        forceRename: patchmon
        ports:
          http:
            port: &frontendPort 3000
      backend:
        controller: backend
        forceRename: patchmon-backend
        ports:
          http:
            port: 3001

    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]
            url: https://patchmon.riki.boo
        hostnames:
          - patchmon.riki.boo
        parentRefs:
          - name: envoy-riki-boo-public
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *frontendPort

    persistence:
      data:
        existingClaim: patchmon
        advancedMounts:
          backend:
            app:
              - path: /app/agents
                subPath: agents
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
