---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app patchmon
spec:
  chartRef:
    kind: OCIRepository
    name: patchmon
  interval: 30m
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    controllers:
      app:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
          secret.reloader.stakater.com/reload: patchmon-secret,patchmon-pguser-secret
        initContainers:
          01-init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
            envFrom:
              - secretRef:
                  name: patchmon-initdb-secret
        containers:
          app:
            image:
              repository: ghcr.io/patchmon/patchmon-server
              tag: 2.0.0@sha256:d781332df3e9a3b21bfb0c5a297b1d329d360ad0a5d8249cf273da2a96454398
            env:
              APP_ENV: production
              PORT: "3000"
              SERVER_PROTOCOL: https
              SERVER_HOST: patchmon.riki.boo
              SERVER_PORT: "443"
              CORS_ORIGIN: https://patchmon.riki.boo
              LOG_LEVEL: info
              ENABLE_LOGGING: "true"
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: patchmon-pguser-secret
                    key: uri
              REDIS_HOST: patchmon-dragonfly
              REDIS_PORT: "6379"
              REDIS_DB: "0"
              TRUST_PROXY: "true"
              ENABLE_HSTS: "true"
              DEFAULT_USER_ROLE: user
              GUACD_ADDRESS: patchmon-guacd:4822
            envFrom:
              - secretRef:
                  name: patchmon-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 3000
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 3000
              startup:
                enabled: true
                custom: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
                  httpGet:
                    path: /health
                    port: 3000
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi

      guacd:
        replicas: 1
        containers:
          app:
            image:
              repository: docker.io/guacamole/guacd
              tag: 1.6.0@sha256:8974eaa9ba32f713daf311e7cc8cd7e4cdfba1edea39eed75524e78ef4b08f4f
            probes:
              liveness:
                enabled: true
                spec:
                  tcpSocket:
                    port: 4822
              readiness:
                enabled: true
                spec:
                  tcpSocket:
                    port: 4822
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
                  tcpSocket:
                    port: 4822
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 512Mi

    service:
      app:
        primary: true
        controller: app
        forceRename: patchmon
        ports:
          http:
            port: &httpPort 3000
      guacd:
        controller: guacd
        forceRename: patchmon-guacd
        ports:
          guacd:
            port: 4822

    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]
            url: https://patchmon.riki.boo
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Selfhosted
          gethomepage.dev/name: PatchMon
          gethomepage.dev/pod-selector: app.kubernetes.io/name=patchmon,app.kubernetes.io/controller=app
          gethomepage.dev/icon: mdi-package-up
        hostnames:
          - patchmon.riki.boo
        parentRefs:
          - name: envoy-riki-boo-public
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *httpPort

    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
