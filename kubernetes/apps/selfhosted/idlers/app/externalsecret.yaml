---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: idlers
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: idlers-secret
    template:
      data:
        DB_HOST: "{{ .DB_HOST }}"
        DB_DATABASE: "{{ .DB_DATABASE }}"
        DB_USERNAME: "{{ .DB_USERNAME }}"
        DB_PASSWORD: "{{ .DB_PASSWORD }}"
        MYSQL_ROOT_PASSWORD: "{{ .MYSQL_ROOT_PASSWORD }}"
        MYSQL_USER: "{{ .MYSQL_USER }}"
        MYSQL_PASSWORD: "{{ .MYSQL_PASSWORD }}"
        MYSQL_DATABASE: "{{ .MYSQL_DATABASE }}"
  data:
    - secretKey: DB_HOST
      remoteRef:
        key: /idlers/DB_HOST
    - secretKey: DB_DATABASE
      remoteRef:
        key: /idlers/DB_DATABASE
    - secretKey: DB_USERNAME
      remoteRef:
        key: /idlers/DB_USERNAME
    - secretKey: DB_PASSWORD
      remoteRef:
        key: /idlers/DB_PASSWORD
    - secretKey: MYSQL_ROOT_PASSWORD
      remoteRef:
        key: /idlers/MYSQL_ROOT_PASSWORD
    - secretKey: MYSQL_USER
      remoteRef:
        key: /idlers/MYSQL_USER
    - secretKey: MYSQL_PASSWORD
      remoteRef:
        key: /idlers/MYSQL_PASSWORD
    - secretKey: MYSQL_DATABASE
      remoteRef:
        key: /idlers/MYSQL_DATABASE
