---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app jotty
spec:
  chartRef:
    kind: OCIRepository
    name: jotty
  interval: 30m
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    controllers:
      jotty:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/fccview/jotty
              tag: 1.22.0@sha256:a8fcab3c49ee7b9e21e95063fd07476ee41e85a9419b0a47ac1d0e52a1fd92f6
            env:
              APP_URL: https://jotty.brauni.dev
              NODE_ENV: production
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi

    service:
      app:
        controller: jotty
        primary: true
        ports:
          http:
            port: &port 3000

    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]
            url: https://jotty.brauni.dev
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Tools
          gethomepage.dev/name: Jotty
          gethomepage.dev/pod-selector: app.kubernetes.io/name=jotty
          gethomepage.dev/icon: mdi-notebook-edit-outline
        hostnames:
          - jotty.brauni.dev
        parentRefs:
          - name: envoy-brauni-dev-public
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port

    persistence:
      data:
        existingClaim: jotty
        advancedMounts:
          jotty:
            app:
              - path: /app/data
                subPath: data
              - path: /app/config
                subPath: config
              - path: /app/.next/cache
                subPath: cache
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
