---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app vaultwarden
spec:
  chartRef:
    kind: OCIRepository
    name: vaultwarden
  interval: 30m
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    controllers:
      vaultwarden:
        annotations:
          reloader.stakater.com/auto: "true"
          secret.reloader.stakater.com/reload: vaultwarden-secret,vaultwarden-pguser-secret
        initContainers:
          01-init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
            envFrom:
              - secretRef:
                  name: vaultwarden-initdb-secret
        containers:
          app:
            image:
              repository: docker.io/vaultwarden/server
              tag: 1.37.0@sha256:e6443e3d5ed8fcee2204b89ec778d7f24d0173bcc42d1ea34f990304f5f63f51
            env:
              DOMAIN: https://vaultwarden.brauni.dev
              ROCKET_PORT: &port 80
              SIGNUPS_ALLOWED: "true"
              WEBSOCKET_ENABLED: "false"
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: vaultwarden-pguser-secret
                    key: uri
            envFrom:
              - secretRef:
                  name: vaultwarden-secret
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi

    service:
      app:
        controller: vaultwarden
        ports:
          http:
            port: *port

    persistence:
      data:
        existingClaim: *app
        advancedMounts:
          vaultwarden:
            app:
              - path: /data
