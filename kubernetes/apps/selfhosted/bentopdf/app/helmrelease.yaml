---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app bentopdf
spec:
  chartRef:
    kind: OCIRepository
    name: bentopdf
  interval: 30m
  driftDetection:
    mode: enabled
  values:
    controllers:
      bentopdf:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          01-init-nginx-dirs:
            image:
              repository: ghcr.io/alam00000/bentopdf-simple
              tag: latest@sha256:37a73aafa9ca2889a52ebe4a9b1788207005930126616a1025642f4765e5eaec
            command:
              - /bin/sh
              - -c
              - |
                mkdir -p /var/lib/nginx/logs /var/lib/nginx/tmp/client_body
        containers:
          app:
            image:
              repository: ghcr.io/alam00000/bentopdf-simple
              tag: latest@sha256:37a73aafa9ca2889a52ebe4a9b1788207005930126616a1025642f4765e5eaec
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi

    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: bentopdf
        ports:
          http:
            port: &port 8080

    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]
            url: https://pdf.brauni.dev
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Tools
          gethomepage.dev/name: BentoPDF
          gethomepage.dev/pod-selector: app.kubernetes.io/name=bentopdf
          gethomepage.dev/icon: mdi-file-pdf-box
        hostnames:
          - pdf.brauni.dev
          - bentopdf.brauni.dev
        parentRefs:
          - name: envoy-brauni-dev-public
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port

    persistence:
      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 32Mi
        globalMounts:
          - subPath: cache
            path: /var/cache/nginx
          - subPath: tmp
            path: /etc/nginx/tmp
      varlib:
        type: emptyDir
        medium: Memory
        sizeLimit: 32Mi
        globalMounts:
          - path: /var/lib/nginx
