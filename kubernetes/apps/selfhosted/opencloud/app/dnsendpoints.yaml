---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: opencloud
  annotations:
    dns.scope: all
spec:
  endpoints:
    - dnsName: files.brauni.dev
      recordType: CNAME
      targets:
        - public.brauni.dev
    - dnsName: opencloud.brauni.dev
      recordType: CNAME
      targets:
        - public.brauni.dev
