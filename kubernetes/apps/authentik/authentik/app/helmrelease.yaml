---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  chart:
    spec:
      chart: authentik
      sourceRef:
        kind: HelmRepository
        name: authentik
      version: 2026.5.5
  interval: 30m
  driftDetection:
    mode: enabled
  values:
    postgresql:
      enabled: false

    serviceAccount:
      create: false

    authentik:
      existingSecret:
        secretName: authentik-secret
      web:
        path: /

    global:
      env:
        - name: AUTHENTIK_POSTGRESQL__HOST
          valueFrom:
            secretKeyRef:
              name: &pguser authentik-pguser-secret
              key: host
        - name: AUTHENTIK_POSTGRESQL__PORT
          valueFrom:
            secretKeyRef:
              name: *pguser
              key: port
        - name: AUTHENTIK_POSTGRESQL__NAME
          valueFrom:
            secretKeyRef:
              name: *pguser
              key: db
        - name: AUTHENTIK_POSTGRESQL__USER
          valueFrom:
            secretKeyRef:
              name: *pguser
              key: user
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: *pguser
              key: password
      image:
        repository: ghcr.io/goauthentik/dev-server
        tag: gh-sdko-oauth-account-selection
      podAnnotations:
        reloader.stakater.com/auto: "true"
        secret.reloader.stakater.com/reload: authentik-secret,authentik-initdb-secret,authentik-pguser-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: authentik
      volumeMounts:
        - name: data
          mountPath: /data

    server:
      serviceAccountName: authentik
      initContainers:
        - name: init-db
          image: ghcr.io/home-operations/postgres-init:18.4@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
          envFrom:
            - secretRef:
                name: authentik-initdb-secret
      containerSecurityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop:
            - ALL
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1Gi
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          interval: 1m
          scrapeTimeout: 10s
      route:
        main:
          enabled: true
          annotations:
            gatus.home-operations.com/endpoint: |-
              conditions: ["[STATUS] == 200"]
              url: https://sso.brauni.dev/-/health/live/
            gethomepage.dev/enabled: "true"
            gethomepage.dev/group: Platform
            gethomepage.dev/name: Authentik
            gethomepage.dev/pod-selector: app.kubernetes.io/name=authentik,app.kubernetes.io/component=server
            gethomepage.dev/icon: mdi-shield-account
          hostnames:
            - sso.brauni.dev
          parentRefs:
            - name: envoy-brauni-dev-public
              namespace: network
              sectionName: https

    worker:
      serviceAccountName: authentik
      automountServiceAccountToken: false
      initContainers:
        - name: init-db
          image: ghcr.io/home-operations/postgres-init:18.4@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
          envFrom:
            - secretRef:
                name: authentik-initdb-secret
      containerSecurityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop:
            - ALL
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1Gi
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          interval: 1m
          scrapeTimeout: 10s

    prometheus:
      rules:
        enabled: true
