---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flux-operator
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Platform
    gethomepage.dev/name: Flux Operator
    gethomepage.dev/pod-selector: app.kubernetes.io/name=flux-operator
    gethomepage.dev/icon: flux-cd.png
spec:
  hostnames:
    - flux-operator.riki.boo
  parentRefs:
    - name: envoy-riki-boo-public
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: flux-operator
          namespace: flux-system
          port: 9080
