---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app obsidian-web
spec:
  chartRef:
    kind: OCIRepository
    name: obsidian-web
  interval: 30m
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        # linuxserver.io images boot their s6-overlay init as root (no USER
        # directive in the image) and only drop to PUID/PGID once services
        # start, so runAsNonRoot/runAsUser here would prevent the container
        # from starting at all.
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    controllers:
      app:
        strategy: Recreate
        containers:
          app:
            image:
              repository: lscr.io/linuxserver/obsidian
              tag: v1.12.7-ls139@sha256:27a2cd169c640367eb2af384d3a49906f0f72e7d449fdc0b18a26e103f4f73ae
            env:
              PUID: "1000"
              PGID: "1000"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  timeoutSeconds: 10
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
                add:
                  - SETUID
                  - SETGID
                  - CHOWN
                  - DAC_OVERRIDE
                  - FOWNER
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 3Gi

    service:
      app:
        forceRename: obsidian-web
        primary: true
        controller: app
        ports:
          http:
            port: 3000

    persistence:
      config:
        existingClaim: obsidian-web
        globalMounts:
          - path: /config
      vault:
        existingClaim: vault
        globalMounts:
          - path: /vault
      # KasmVNC/the bundled browser can exhaust the default 64Mi /dev/shm,
      # which crashes rendering. Give it more headroom.
      dshm:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        globalMounts:
          - path: /dev/shm
