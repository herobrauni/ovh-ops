---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: retrieval
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: retrieval
      app.kubernetes.io/instance: retrieval
      app.kubernetes.io/controller: retrieval
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: obsidian
            app.kubernetes.io/name: hermes
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  # This pod is deliberately allowed wider egress than the hermes agent pod:
  # it processes no untrusted input (it only reads the vault it already has
  # full filesystem access to, and text it embeds/searches never reaches an
  # LLM) and it makes no LLM calls itself, so there is no prompt-injection or
  # data-exfiltration surface to constrain here. The only reason this needs
  # any internet egress at all is the pip install of pinned dependencies in
  # the `02-deps` initContainer.
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: obsidian
            app.kubernetes.io/name: embeddings
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: dbms
            cnpg.io/cluster: obsidian
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Broadened from the two explicit PyPI hosts to any DNS-resolvable host:
    # uv's install timed out reaching pypi.org under the exact-name allow-list
    # (files.pythonhosted.org redirects/CDN chains weren't reliably matched),
    # while the same `matchPattern: "*"` works for hermes. This pod is already
    # the deliberately-trusted, wider-egress one (no untrusted input, no LLM),
    # and it's still DNS-proxy gated (no direct-IP egress).
    - toFQDNs:
        - matchPattern: "*"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
