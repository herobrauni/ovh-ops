---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: syncthing
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: syncthing-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Pins the GUI/REST API key so the hermes daily-digest job can query
        # /rest/system/connections and report a phone that has silently
        # stopped syncing. Without a fixed key Syncthing generates a random
        # one on first boot, which nothing else can discover.
        STGUIAPIKEY: "{{ .STGUIAPIKEY }}"
  data:
    - secretKey: STGUIAPIKEY
      remoteRef:
        key: /syncthing/STGUIAPIKEY
