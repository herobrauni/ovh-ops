---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app syncthing
spec:
  chartRef:
    kind: OCIRepository
    name: syncthing
  interval: 30m
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        # The upstream syncthing/syncthing image has no USER directive and
        # its entrypoint uses su-exec to drop from root to PUID/PGID at
        # startup, so the pod cannot run under runAsNonRoot/runAsUser here.
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    controllers:
      app:
        strategy: Recreate
        containers:
          app:
            image:
              repository: docker.io/syncthing/syncthing
              tag: 2.1.2@sha256:4464f4161dd0251e20d46bb3aec83363db75d80cef1abdd5d5fd4054b04a004d
            env:
              PUID: "1000"
              PGID: "1000"
              STGUIADDRESS: 0.0.0.0:8384
            envFrom:
              # Supplies STGUIAPIKEY so the hermes daily digest can query
              # /rest/system/connections and detect a stalled phone sync.
              - secretRef:
                  name: syncthing-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /rest/noauth/health
                    port: 8384
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /rest/noauth/health
                    port: 8384
                  initialDelaySeconds: 15
                  periodSeconds: 15
                  timeoutSeconds: 10
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /rest/noauth/health
                    port: 8384
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
                add:
                  - SETUID
                  - SETGID
                  - CHOWN
                  - DAC_OVERRIDE
                  - FOWNER
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 1Gi

    service:
      app:
        forceRename: syncthing
        primary: true
        controller: app
        # Exposes this Service directly on the tailnet via the Tailscale
        # Kubernetes operator (verified against current docs at
        # https://tailscale.com/docs/kubernetes-operator/ingress/expose-workload-to-tailnet-l3):
        # spec.type: LoadBalancer + spec.loadBalancerClass: tailscale is the
        # current recommended mechanism, combined with the
        # tailscale.com/hostname annotation to pin the MagicDNS name. No
        # public ingress/DNSEndpoint is created for this app.
        type: LoadBalancer
        loadBalancerClass: tailscale
        annotations:
          tailscale.com/hostname: syncthing
        ports:
          gui:
            port: 8384
          sync:
            port: 22000

    persistence:
      config:
        existingClaim: syncthing-config
        globalMounts:
          - path: /var/syncthing/config
      vault:
        existingClaim: vault
        globalMounts:
          - path: /var/syncthing/vault

    # NOTE: After first pairing this device with the phone's Obsidian app
    # over the tailnet, turn OFF "Global Discovery" and "Global Relaying"
    # in the Syncthing GUI (Settings > Connections) for this node. The
    # phone reaches this pod's sync port (22000) directly over Tailscale,
    # so neither service is needed and leaving them on only announces this
    # node to Syncthing's public discovery/relay infrastructure.
