---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: hermes-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        TELEGRAM_BOT_TOKEN: "{{ .TELEGRAM_BOT_TOKEN }}"
        TELEGRAM_ALLOWED_USERS: "{{ .TELEGRAM_ALLOWED_USERS }}"
        TELEGRAM_HOME_CHANNEL: "{{ .TELEGRAM_HOME_CHANNEL }}"
        OPENROUTER_API_KEY: "{{ .OPENROUTER_API_KEY }}"
        # Active LLM credential: z.ai GLM Coding Plan (config.yaml uses the
        # custom provider pinned to the coding endpoint). OPENROUTER_API_KEY is
        # kept so switching the model block back to OpenRouter needs no secret
        # change.
        ZAI_API_KEY: "{{ .ZAI_API_KEY }}"
        GROQ_API_KEY: "{{ .GROQ_API_KEY }}"
  data:
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: /obsidian/TELEGRAM_BOT_TOKEN
    - secretKey: TELEGRAM_ALLOWED_USERS
      remoteRef:
        key: /obsidian/TELEGRAM_ALLOWED_USERS
    - secretKey: TELEGRAM_HOME_CHANNEL
      remoteRef:
        key: /obsidian/TELEGRAM_HOME_CHANNEL
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: /obsidian/OPENROUTER_API_KEY
    - secretKey: ZAI_API_KEY
      remoteRef:
        key: /obsidian/ZAI_API_KEY
    - secretKey: GROQ_API_KEY
      remoteRef:
        key: /obsidian/GROQ_API_KEY
