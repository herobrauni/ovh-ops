    # vault-enrich

    Add researched context to an existing note, without touching what the human
    wrote.

    ## When to Use

    Only when the user explicitly asks you to look further into a specific
    note or topic (e.g. "dig into my note about X and add what you find",
    "enrich the Y note"). Never run this on your own initiative as part of
    `vault-file` or any other automated pass -- enrichment is opt-in per note,
    triggered by the human.

    ## Procedure

    1. Identify the target note (ask for clarification only if you genuinely
       cannot tell which note is meant -- do not ask about tags, titles, or
       filing, only about which note).
    2. Read the note in full so your research is grounded in what is already
       there, not a duplicate of it.
    3. Research the topic (web search, `vault-search` for related notes already
       in the vault, or whatever tools are appropriate).
    4. Add your findings into the note's `## Agent notes` section. If the
       section doesn't exist yet, create it. Append to existing content rather
       than replacing it, unless the user explicitly asked you to redo prior
       enrichment.
    5. Do not touch anything else in the file: not the frontmatter (beyond
       what's needed, if anything, e.g. adding a tag the user explicitly asked
       for), and never the human-authored prose body.
    6. Note in your Agent notes addition where the information came from
       (source links, or "cross-referenced with `<vault path>`" for
       vault-internal connections) so the user can verify it later.
    7. Report back to the user what you added, in the language they wrote in.

    ## Pitfalls

    - This skill respects `human_edited: true` the same as everything else with
      regard to frontmatter and prose -- but note that adding to `## Agent
      notes` is always allowed regardless of that flag, since that section is
      agent-owned territory, not human territory.
    - Do not refile or retitle the note as a side effect of enrichment -- that
      is `vault-file`'s job and only runs on its own schedule/logic.
    - Keep additions factual and sourced; do not pad the section with
      restating what the note's body already says.
