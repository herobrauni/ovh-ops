---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: embeddings
spec:
  chartRef:
    kind: OCIRepository
    name: embeddings
  interval: 30m
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    controllers:
      embeddings:
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/huggingface/text-embeddings-inference
              tag: cpu-1.9.3@sha256:ad950d30878eceb72aaf32024d26fa2b1d04a75304fa0b4776b49aa1941fea07
            args:
              - --model-id=BAAI/bge-m3
              - --port=8080
              - --auto-truncate
            env:
              HF_HOME: /data
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  # First boot downloads the ~2.3GB BAAI/bge-m3 model on CPU-only
                  # OVH VM nodes, which can take a long time depending on network
                  # conditions. Allow up to ~30 minutes before giving up.
                  httpGet:
                    path: /health
                    port: 8080
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 180
            resources:
              requests:
                cpu: 500m
                memory: 2Gi
              limits:
                memory: 6Gi

    service:
      app:
        controller: embeddings
        ports:
          http:
            port: 8080

    persistence:
      cache:
        existingClaim: embeddings-cache
        globalMounts:
          - path: /data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
