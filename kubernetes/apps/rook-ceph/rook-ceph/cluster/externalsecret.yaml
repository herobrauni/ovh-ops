---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name rook-ceph-mon
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: *name
    template:
      type: kubernetes.io/rook
      data:
        cluster-name: rook-ceph
        admin-secret: "{{ .ROOK_EXTERNAL_ADMIN_SECRET }}"
        ceph-secret: "{{ .ROOK_EXTERNAL_USER_SECRET }}"
        ceph-username: "{{ .ROOK_EXTERNAL_USERNAME }}"
        fsid: "{{ .ROOK_EXTERNAL_FSID }}"
        mon-secret: "{{ .ROOK_EXTERNAL_MONITOR_SECRET }}"
  data:
    - secretKey: ROOK_EXTERNAL_ADMIN_SECRET
      remoteRef:
        key: /rook-ceph/ROOK_EXTERNAL_ADMIN_SECRET
    - secretKey: ROOK_EXTERNAL_USER_SECRET
      remoteRef:
        key: /rook-ceph/ROOK_EXTERNAL_USER_SECRET
    - secretKey: ROOK_EXTERNAL_USERNAME
      remoteRef:
        key: /rook-ceph/ROOK_EXTERNAL_USERNAME
    - secretKey: ROOK_EXTERNAL_FSID
      remoteRef:
        key: /rook-ceph/ROOK_EXTERNAL_FSID
    - secretKey: ROOK_EXTERNAL_MONITOR_SECRET
      remoteRef:
        key: /rook-ceph/ROOK_EXTERNAL_MONITOR_SECRET
---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
