---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: beszel-hub
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: beszel-hub-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        USER_EMAIL: "{{ .USER_EMAIL }}"
        USER_PASSWORD: "{{ .USER_PASSWORD }}"
  data:
    - secretKey: USER_EMAIL
      remoteRef:
        key: /beszel-hub/USER_EMAIL
    - secretKey: USER_PASSWORD
      remoteRef:
        key: /beszel-hub/USER_PASSWORD
