---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: proxmox-observability
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  configMapRef:
    name: proxmox-observability-dashboard
    key: proxmox-observability.json
---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: proxmox-logs
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: victoria-logs
      inputName: DS_VICTORIALOGS
  configMapRef:
    name: proxmox-logs-dashboard
    key: proxmox-logs.json
