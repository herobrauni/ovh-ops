---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      victoria-logs:
        containers:
          app:
            image:
              repository: docker.io/victoriametrics/victoria-logs
              tag: v1.24.0-victorialogs
            args:
              - -httpListenAddr=:9428
              - -retentionPeriod=14d
              - -storageDataPath=/var/lib/victoria-logs
            env:
              TZ: Europe/Berlin
            probes:
              liveness: &httpProbes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 9428
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *httpProbes
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 2Gi
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: ceph-block
        accessMode: ReadWriteOnce
        size: 100Gi
        globalMounts:
          - path: /var/lib/victoria-logs
