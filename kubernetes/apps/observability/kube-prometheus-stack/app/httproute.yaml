---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: alertmanager
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Observability
    gethomepage.dev/name: Alertmanager
    gethomepage.dev/icon: alertmanager.png
spec:
  hostnames:
    - alertmanager.riki.boo
  parentRefs:
    - name: envoy-riki-boo-public
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: alertmanager-operated
          port: 9093
---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Observability
    gethomepage.dev/name: Prometheus
    gethomepage.dev/icon: prometheus.png
spec:
  hostnames:
    - prometheus.riki.boo
  parentRefs:
    - name: envoy-riki-boo-public
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: prometheus-operated
          port: 9090
