---
connectivity:
  checker:
    target: 1.1.1.1:53
    interval: 1m

endpoints:
  - name: Cloudflare
    group: connectivity
    url: icmp://1.1.1.1
    interval: 1m
    conditions:
      - "[CONNECTED] == true"

  - name: Google
    group: connectivity
    url: icmp://8.8.8.8
    interval: 1m
    conditions:
      - "[CONNECTED] == true"

  - name: Quad9
    group: connectivity
    url: icmp://9.9.9.9
    interval: 1m
    conditions:
      - "[CONNECTED] == true"

  - name: Proxmox API ovhsbg1
    group: proxmox
    url: https://54.38.92.92:8006/api2/json/version
    interval: 1m
    client:
      timeout: 10s
    conditions:
      - "[STATUS] == 200"

  - name: Proxmox API ovhsbg2
    group: proxmox
    url: https://54.38.94.158:8006/api2/json/version
    interval: 1m
    client:
      timeout: 10s
    conditions:
      - "[STATUS] == 200"

  - name: Proxmox API ovhsbg3
    group: proxmox
    url: https://54.38.94.150:8006/api2/json/version
    interval: 1m
    client:
      timeout: 10s
    conditions:
      - "[STATUS] == 200"

  - name: Proxmox node ICMP ovhsbg1
    group: proxmox
    url: icmp://54.38.92.92
    interval: 1m
    conditions:
      - "[CONNECTED] == true"

  - name: Proxmox node ICMP ovhsbg2
    group: proxmox
    url: icmp://54.38.94.158
    interval: 1m
    conditions:
      - "[CONNECTED] == true"

  - name: Proxmox node ICMP ovhsbg3
    group: proxmox
    url: icmp://54.38.94.150
    interval: 1m
    conditions:
      - "[CONNECTED] == true"

  - name: Proxmox backup endpoint
    group: proxmox
    url: tcp://pbs.riki.boo:8007
    interval: 1m
    client:
      timeout: 10s
    conditions:
      - "[CONNECTED] == true"

metrics: true

storage:
  type: sqlite
  caching: true
  path: ${GATUS_CONFIG_PATH}/gatus.db

ui:
  title: Status | Gatus
  header: Status
  logo: https://avatars.githubusercontent.com/u/20051140
  link: https://github.com/herobrauni
  buttons:
    - name: Github
      link: https://github.com/herobrauni
    - name: Homelab
      link: https://github.com/herobrauni/ovh-ops

web:
  port: ${GATUS_WEB_PORT}
