---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kopia
spec:
  chartRef:
    kind: OCIRepository
    name: kopia
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    controllers:
      kopia:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          connect-repository:
            image:
              repository: ghcr.io/home-operations/kopia
              tag: 0.22.3@sha256:17ab64542280197a5368247deaefadc3e3bbe15714ab666c2455a06824e86efd
            command:
              - /bin/sh
              - -c
              - |
                if [ ! -f /config/repository.config ]; then
                  set -- kopia repository connect sftp \
                    --host "$${SFTP_HOST}" \
                    --port "$${SFTP_PORT}" \
                    --path "$${SFTP_PATH}" \
                    --username "$${SFTP_USERNAME}" \
                    --config-file /config/repository.config \
                    --persist-credentials

                  if [ -n "$${SFTP_KEY_FILE:-}" ]; then
                    set -- "$@" --key-data "$${SFTP_KEY_FILE}"
                  fi

                  if [ -n "$${SFTP_KNOWN_HOSTS_DATA:-}" ]; then
                    set -- "$@" --known-hosts-data "$${SFTP_KNOWN_HOSTS_DATA}"
                  fi

                  if [ -n "$${KOPIA_PASSWORD:-}" ]; then
                    set -- "$@" --password "$${KOPIA_PASSWORD}"
                  fi

                  "$@"
                fi
            envFrom: &envFrom
              - secretRef:
                  name: kopia-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"]}
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/kopia
              tag: 0.22.3@sha256:17ab64542280197a5368247deaefadc3e3bbe15714ab666c2455a06824e86efd
            args:
              - --without-password
            env:
              KOPIA_WEB_ENABLED: true
              KOPIA_WEB_PORT: &port 80
              TZ: Europe/Berlin
            envFrom: *envFrom
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: kopia
        ports:
          http:
            port: *port
    persistence:
      config:
        type: emptyDir
        globalMounts:
          - path: /config
      tmpfs:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /tmp
