---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app comet
spec:
  chartRef:
    kind: OCIRepository
    name: comet
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      comet:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
          secret.reloader.stakater.com/reload: comet-secret,comet-initdb-secret,comet-pguser-secret
        initContainers:
          01-init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
            envFrom:
              - secretRef:
                  name: comet-initdb-secret
        containers:
          app:
            image:
              repository: docker.io/g0ldyy/comet
              tag: latest@sha256:6679bd38bd500dc65bb1adbbad3d1428fa7c8978e653285ed5e619af2b676157
            env:
              DATABASE_TYPE: postgresql
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: &pguser comet-pguser-secret
                    key: uri
              COMETNET_BOOTSTRAP_NODES: '["wss://cometnet-beta.feels.legal", "wss://cometnet.micasa161.me","wss://cometuk2.sophnsharm.stream/cometnet/ws",  "wss://cometnetuk.sophnsharm.stream/cometnet/ws", "wss://cometnet.stremio.ru", "https://cometnet.elfhosted.com", "wss://cometnet.streamproxy.xyz"]'
              COMETNET_CONTRIBUTION_MODE: leech
              COMETNET_ENABLED: "true"
              COMETNET_NODE_ALIAS: 480p.com
              COMETNET_ADVERTISE_URL: "wss://cometnet.480p.com/cometnet/ws"
              FASTAPI_HOST: 0.0.0.0
              FASTAPI_PORT: &targetPort 8000
              HOME: /tmp
              INDEXER_MANAGER_UPDATE_INTERVAL: "900"
              PUBLIC_BASE_URL: https://comet.480p.com
              USE_GUNICORN: "true"
              UV_CACHE_DIR: /tmp/.cache/uv
              XDG_CACHE_HOME: /tmp/.cache
              MEMORY_TRIM_INTERVAL: 300
              BACKGROUND_SCRAPER_ENABLED: "true"
              BACKGROUND_SCRAPER_CONCURRENT_WORKERS: 5
              BACKGROUND_SCRAPER_MAX_MOVIES_PER_RUN: 1000
              BACKGROUND_SCRAPER_MAX_SERIES_PER_RUN: 1000
              BACKGROUND_SCRAPER_MAX_EPISODES_PER_SERIES_PER_RUN: 2500
              # scrape
              SCRAPE_COMET: "background"
              COMET_URL: "https://comet.feels.legal"
              SCRAPE_ZILEAN: "background"
              ZILEAN_URL: https://zileanfortheweebs.midnightignite.me
              SCRAPE_STREMTHRU: "background"
              STREMTHRU_SCRAPE_URL: http://stremthru.media.svc.cluster.local
              SCRAPE_DMM: "background"
              DMM_INGEST_ENABLED: "true"
              DMM_INGEST_INTERVAL: 86400 # Seconds between ingestion cycles (default: 1 day)
              DMM_INGEST_CONCURRENT_WORKERS: 4 # Number of concurrent workers for DMM ingestion. Increase this if you have a powerful CPU. Make sure EXECUTOR_MAX_WORKERS is set to at least this value.
              DMM_INGEST_BATCH_SIZE: 100 # Number of files to process per batch. Increase this for better throughput if your CPU can handle it.
              SCRAPE_BITMAGNET: "background"
              BITMAGNET_URL: http://bitmagnet.media.svc.cluster.local
              SCRAPE_DEBRIDIO: "background"
              DEBRIDIO_PROVIDER: realdebrid

            envFrom:
              - secretRef:
                  name: comet-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *targetPort
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *targetPort
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *targetPort
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 500m
                memory: 2000Mi
              limits:
                memory: 6Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
    service:
      app:
        controller: comet
        ports:
          http:
            port: 80
            targetPort: *targetPort
          cometnet:
            port: 8765
            targetPort: 8765
    persistence:
      config:
        existingClaim: comet
        globalMounts:
          - path: /app/data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
