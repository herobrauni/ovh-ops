---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app comet
spec:
  chartRef:
    kind: OCIRepository
    name: comet
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      comet:
        annotations:
          reloader.stakater.com/auto: "true"
          secret.reloader.stakater.com/reload: comet-secret,comet-initdb-secret,comet-pguser-secret
        initContainers:
          01-init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: "18"
            envFrom:
              - secretRef:
                  name: comet-initdb-secret
        containers:
          app:
            image:
              repository: docker.io/g0ldyy/comet
              tag: latest
            env:
              DATABASE_TYPE: postgresql
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: &pguser comet-pguser-secret
                    key: uri
              BITMAGNET_URL: https://bitmagnet.media.svc.cluster.local
              SCRAPE_COMET: both
              COMET_URL: https://comet.feels.legal
              COMETNET_BOOTSTRAP_NODES: '["wss://cometnet-beta.feels.legal", "wss://cometnet.micasa161.me","wss://cometuk2.sophnsharm.stream/cometnet/ws",  "wss://cometnetuk.sophnsharm.stream/cometnet/ws", "wss://cometnet.stremio.ru", "https://cometnet.elfhosted.com", "wss://cometnet.streamproxy.xyz"]'
              COMETNET_CONTRIBUTION_MODE: leech
              COMETNET_ENABLED: "true"
              COMETNET_NODE_ALIAS: 480p.com
              COMETNET_ADVERTISE_URL: "wss://cometnet.480p.com/cometnet/ws"
              FASTAPI_HOST: 0.0.0.0
              FASTAPI_PORT: &targetPort 8000
              HOME: /tmp
              INDEXER_MANAGER_UPDATE_INTERVAL: "900"
              PUBLIC_BASE_URL: https://comet.brauni.dev
              PROWLARR_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: prowlarr-secret
                    key: PROWLARR__AUTH__APIKEY
              PROWLARR_URL: http://prowlarr.media.svc.cluster.local
              DMM_INGEST_ENABLED: "true"
              SCRAPE_BITMAGNET: both
              SCRAPE_PROWLARR: live
              SCRAPE_STREMTHRU: both
              SCRAPE_ZILEAN: both
              STREMTHRU_SCRAPE_URL: https://stremthru.13377001.xyz
              USE_GUNICORN: "true"
              UV_CACHE_DIR: /tmp/.cache/uv
              XDG_CACHE_HOME: /tmp/.cache
              ZILEAN_URL: https://zileanfortheweebs.midnightignite.me
            envFrom:
              - secretRef:
                  name: comet-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *targetPort
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *targetPort
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *targetPort
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
    service:
      app:
        controller: comet
        ports:
          http:
            port: 80
            targetPort: *targetPort
          cometnet:
            port: 8765
            targetPort: 8765
    persistence:
      config:
        existingClaim: comet
        globalMounts:
          - path: /app/data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
