---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: comet
  annotations:
    dns.scope: all
spec:
  endpoints:
    - dnsName: comet.brauni.dev
      recordType: CNAME
      targets:
        - public.brauni.dev
    - dnsName: comet.riki.boo
      recordType: CNAME
      targets:
        - public.riki.boo
---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: cometnet
  annotations:
    dns.scope: cloudflare
spec:
  endpoints:
    - dnsName: cometnet.480p.com
      recordType: CNAME
      targets:
        - public.480p.com