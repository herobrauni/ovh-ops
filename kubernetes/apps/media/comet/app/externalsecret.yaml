---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: comet
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: comet-secret
    creationPolicy: Owner
    template:
      data:
        ADMIN_DASHBOARD_PASSWORD: "{{ .ADMIN_DASHBOARD_PASSWORD }}"
        DEBRIDIO_API_KEY: "{{ .RD_APIKEY }}"
  data:
    - secretKey: ADMIN_DASHBOARD_PASSWORD
      remoteRef:
        key: /comet/ADMIN_DASHBOARD_PASSWORD
    - secretKey: RD_APIKEY
      remoteRef:
        key: /comet/RD_APIKEY
