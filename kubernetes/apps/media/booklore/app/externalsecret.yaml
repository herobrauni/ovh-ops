---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: booklore
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: booklore-secret
    creationPolicy: Owner
    template:
      data:
        booklore_mariadb_password: "{{ .mariadb_password }}"
        booklore_mariadb_root_password: "{{ .mariadb_root_password }}"
  data:
    - secretKey: mariadb_password
      remoteRef:
        key: /booklore/mariadb_password
    - secretKey: mariadb_root_password
      remoteRef:
        key: /booklore/mariadb_root_password
