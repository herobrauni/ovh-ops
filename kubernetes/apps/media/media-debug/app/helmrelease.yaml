---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: media-debug
spec:
  chartRef:
    kind: OCIRepository
    name: media-debug
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
    controllers:
      media-debug:
        forceRename: media-debug
        replicas: 1
        pod:
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: decypharr
                    topologyKey: kubernetes.io/hostname
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/busybox
              tag: 1.37.0@sha256:026ed7273270ec08f6902b4ae8334c23b473e5394bec3bbbdbfe580c710d50bc
            command:
              - /bin/sh
              - -c
              - sleep infinity
            # probes:
            #   liveness:
            #     enabled: true
            #     custom: true
            #     spec:
            #       exec:
            #         command:
            #           - /bin/sh
            #           - -c
            #           - test -r /aio/altmount/version.txt && cat /aio/altmount/version.txt >/dev/null
            #       initialDelaySeconds: 0
            #       periodSeconds: 30
            #       timeoutSeconds: 5
            #       failureThreshold: 3
            #   readiness:
            #     enabled: true
            #     custom: true
            #     spec:
            #       exec:
            #         command:
            #           - /bin/sh
            #           - -c
            #           - test -r /aio/altmount/version.txt && cat /aio/altmount/version.txt >/dev/null
            #       initialDelaySeconds: 0
            #       periodSeconds: 15
            #       timeoutSeconds: 5
            #       failureThreshold: 2
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
    persistence:
      symlinks:
        existingClaim: symlinks
        globalMounts:
          - path: /aio/symlinks
      altmount:
        type: custom
        volumeSpec:
          csi:
            driver: rclone.csi.veloxpack.io
            readOnly: true
            volumeAttributes:
              remote: altmount
              remotePath: "/"
              dir-cache-time: "10s"
              vfs-cache-mode: full
              vfs-cache-max-age: "504h"
              vfs-cache-max-size: "10G"
              vfs-cache-poll-interval: "30s"
              vfs-read-chunk-size: "32M"
              vfs-read-chunk-size-limit: "128M"
              vfs-fast-fingerprint: "true"
              no-modtime: "true"
              no-checksum: "true"
              read-only: "true"
              configData: |
                [altmount]
                type = webdav
                url = http://altmount.media.svc.cluster.local:8080/webdav
                vendor = other
                user = usenet
                pass = e4u2vK8IfaSPI_NKEPNbVpgwSqEGXQ
        globalMounts:
          - path: /aio/altmount
            readOnly: true
