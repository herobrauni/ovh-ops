---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: media-debug
spec:
  chartRef:
    kind: OCIRepository
    name: media-debug
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsUser: 1000
    controllers:
      media-debug:
        forceRename: media-debug
        replicas: 1
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/busybox
              tag: 1.37.0@sha256:026ed7273270ec08f6902b4ae8334c23b473e5394bec3bbbdbfe580c710d50bc
            command:
              - /bin/sh
              - -c
              - sleep infinity
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
          rclone:
            image:
              repository: docker.io/rclone/rclone
              tag: 1.69.3@sha256:1f497a86a6466395e62a5886613a14b7b18809543566ef9fa35fa1371a7ecc0f
            command:
              - /bin/sh
              - -c
              - |
                umount -l /mnt/realdebrid 2>/dev/null || true
                exec rclone mount realdebrid:/ /mnt/realdebrid \
                  --read-only \
                  --dir-cache-time=10s \
                  --vfs-cache-mode=full \
                  --vfs-cache-max-age=504h \
                  --vfs-cache-max-size=10G \
                  --vfs-cache-poll-interval=30s \
                  --vfs-read-chunk-size=32M \
                  --vfs-read-chunk-size-limit=128M \
                  --vfs-fast-fingerprint \
                  --no-modtime \
                  --no-checksum \
                  --allow-other \
                  --cache-dir=/cache
            env:
              RCLONE_CONFIG_REALDEBRID_TYPE: webdav
              RCLONE_CONFIG_REALDEBRID_URL: http://nzbdav.media.svc.cluster.local:3000/
              RCLONE_CONFIG_REALDEBRID_VENDOR: other
              RCLONE_CONFIG_REALDEBRID_USER: usenet
              RCLONE_CONFIG_REALDEBRID_PASS: A5Lb-wn-UvJvVe_WJF5rj3l98Bc9eCQ6dHSG9wWEy7CelesO9gI3SX6AqbfPoQ
            probes:
              liveness: &rclone-probes
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -f /mnt/realdebrid/version.txt
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *rclone-probes
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -f /mnt/realdebrid/version.txt
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              privileged: true
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      fuse:
        type: hostPath
        hostPath: /dev/fuse
        hostPathType: CharDevice
        advancedMounts:
          media-debug:
            rclone:
              - path: /dev/fuse
      symlinks:
        existingClaim: symlinks
        globalMounts:
          - path: /aio/symlinks
      rclone-cache:
        type: emptyDir
        advancedMounts:
          media-debug:
            rclone:
              - path: /cache
      realdebrid:
        type: emptyDir
        advancedMounts:
          media-debug:
            rclone:
              - path: /mnt/realdebrid
                mountPropagation: Bidirectional
            app:
              - path: /aio/remote/realdebrid
                readOnly: true
                mountPropagation: HostToContainer
