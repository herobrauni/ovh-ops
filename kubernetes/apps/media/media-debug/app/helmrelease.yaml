---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: media-debug
spec:
  chartRef:
    kind: OCIRepository
    name: media-debug
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
    controllers:
      media-debug:
        forceRename: media-debug
        replicas: 1
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/busybox
              tag: 1.37.0@sha256:026ed7273270ec08f6902b4ae8334c23b473e5394bec3bbbdbfe580c710d50bc
            command:
              - /bin/sh
              - -c
              - sleep infinity
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
    persistence:
      symlinks:
        existingClaim: symlinks
        globalMounts:
          - path: /aio/symlinks
      realdebrid:
        type: custom
        volumeSpec:
          csi:
            driver: rclone.csi.veloxpack.io
            readOnly: true
            volumeAttributes:
              remote: realdebrid
              remotePath: "/"
              dir-cache-time: "10s"
              vfs-cache-mode: full
              vfs-cache-max-age: "504h"
              vfs-cache-max-size: "10G"
              vfs-cache-poll-interval: "30s"
              vfs-read-chunk-size: "32M"
              vfs-read-chunk-size-limit: "128M"
              vfs-fast-fingerprint: "true"
              no-modtime: "true"
              no-checksum: "true"
              read-only: "true"
              configData: |
                [realdebrid]
                type = webdav
                url = http://nzbdav.media.svc.cluster.local:3000/
                vendor = other
                user = usenet
                pass = e4u2vK8IfaSPI_NKEPNbVpgwSqEGXQ
        globalMounts:
          - path: /aio/remote/realdebrid
            readOnly: true
