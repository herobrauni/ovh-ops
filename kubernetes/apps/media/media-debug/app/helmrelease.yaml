---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: media-debug
spec:
  chartRef:
    kind: OCIRepository
    name: media-debug
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsUser: 1000
    controllers:
      media-debug:
        forceRename: media-debug
        replicas: 1
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/busybox
              tag: 1.37.0@sha256:026ed7273270ec08f6902b4ae8334c23b473e5394bec3bbbdbfe580c710d50bc
            command:
              - /bin/sh
              - -c
              - sleep infinity
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
          rclone-nzbdav:
            image:
              repository: docker.io/rclone/rclone
              tag: 1.74@sha256:eb8788b795f0009324e9572b0e2acb9b56885327c2746b07d67a9d3b893a6602
            command:
              - /bin/sh
              - -c
              - |
                umount -l /host-mount/rclone-media-debug-nzbdav 2>/dev/null || true
                mkdir -p /host-mount/rclone-media-debug-nzbdav
                exec rclone mount nzbdav:/ /host-mount/rclone-media-debug-nzbdav \
                  --dir-cache-time=20s \
                  --vfs-cache-mode=full \
                  --vfs-cache-max-age=24h \
                  --vfs-cache-max-size=20G \
                  --vfs-cache-poll-interval=30s \
                  --buffer-size=0M \
                  --vfs-read-ahead=512M \
                  --vfs-fast-fingerprint \
                  --links \
                  --use-cookies \
                  --no-modtime \
                  --no-checksum \
                  --allow-other \
                  --cache-dir=/cache
            env:
              RCLONE_CONFIG_NZBDAV_TYPE: webdav
              RCLONE_CONFIG_NZBDAV_URL: http://nzbdav.media.svc.cluster.local:3000/
              RCLONE_CONFIG_NZBDAV_VENDOR: other
              RCLONE_CONFIG_NZBDAV_USER: usenet
            probes:
              liveness: &rclone-nzbdav-probes
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -f /host-mount/rclone-media-debug-nzbdav/README
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *rclone-nzbdav-probes
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -f /host-mount/rclone-media-debug-nzbdav/README
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              privileged: true
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      fuse:
        type: hostPath
        hostPath: /dev/fuse
        hostPathType: CharDevice
        advancedMounts:
          media-debug:
            rclone-nzbdav:
              - path: /dev/fuse
      symlinks:
        existingClaim: symlinks
        globalMounts:
          - path: /aio/symlinks
      rclone-cache-nzbdav:
        type: emptyDir
        advancedMounts:
          media-debug:
            rclone-nzbdav:
              - path: /cache
      host-tmp:
        type: hostPath
        hostPath: /tmp
        hostPathType: Directory
        advancedMounts:
          media-debug:
            rclone-nzbdav:
              - path: /host-mount
                mountPropagation: Bidirectional
      nzbdav:
        type: hostPath
        hostPath: /tmp/rclone-media-debug-nzbdav
        hostPathType: DirectoryOrCreate
        advancedMounts:
          media-debug:
            app:
              - path: /aio/remote/nzbdav
                mountPropagation: HostToContainer
