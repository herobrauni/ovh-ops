---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app webdav-nfs-gateway
spec:
  chartRef:
    kind: OCIRepository
    name: webdav-nfs-gateway
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
    controllers:
      webdav-nfs-gateway:
        replicas: 1
        pod:
          affinity:
            podAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: decypharr
                    topologyKey: kubernetes.io/hostname
        containers:
          app:
            image:
              repository: rclone/rclone
              tag: 1.69.3@sha256:1f497a86a6466395e62a5886613a14b7b18809543566ef9fa35fa1371a7ecc0f
            command:
              - rclone
              - serve
              - nfs
              - altmount:/
              - --addr
              - :2049
              - --cache-dir
              - /tmp/rclone
              - --read-only
              - --dir-cache-time=10s
              - --vfs-cache-mode=full
              - --vfs-cache-max-age=504h
              - --vfs-cache-max-size=10G
              - --vfs-cache-poll-interval=30s
              - --vfs-read-chunk-size=32M
              - --vfs-read-chunk-size-limit=128M
              - --vfs-fast-fingerprint
              - --no-modtime
              - --no-checksum
              - --log-level=info
              - --log-format=shortfile
            env:
              RCLONE_CONFIG_ALTMOUNT_TYPE: webdav
              RCLONE_CONFIG_ALTMOUNT_URL: http://decypharr.media.svc.cluster.local:8282/webdav
              RCLONE_CONFIG_ALTMOUNT_VENDOR: other
              RCLONE_CONFIG_ALTMOUNT_USER:
                valueFrom:
                  secretKeyRef:
                    name: webdav-nfs-gateway-secret
                    key: WEBDAV_USER
              RCLONE_CONFIG_ALTMOUNT_PASS:
                valueFrom:
                  secretKeyRef:
                    name: webdav-nfs-gateway-secret
                    key: WEBDAV_PASS
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 2049
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 2049
                  initialDelaySeconds: 5
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 2049
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 2Gi
    service:
      app:
        controller: webdav-nfs-gateway
        type: ClusterIP
        ports:
          nfs:
            enabled: true
            port: 2049
            protocol: TCP
    persistence:
      rclone-cache:
        type: emptyDir
        globalMounts:
          - path: /tmp/rclone
