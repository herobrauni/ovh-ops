---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app webdav-nfs-gateway
spec:
  chartRef:
    kind: OCIRepository
    name: webdav-nfs-gateway
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 0
        runAsNonRoot: false
        runAsUser: 0
    controllers:
      webdav-nfs-gateway:
        replicas: 1
        pod:
          affinity:
            podAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: altmount
                    topologyKey: kubernetes.io/hostname
        containers:
          rclone:
            image:
              repository: rclone/rclone
              tag: 1.69.3@sha256:61e1c1ad74a24450e2f41b38a2f88da0c17f8b8b3d7c258573a4a49c1e186e36
            command:
              - rclone
              - mount
              - altmount:/
              - /data/altmount
              - --read-only
              - --allow-other
              - --dir-cache-time=10s
              - --vfs-cache-mode=full
              - --vfs-cache-max-age=504h
              - --vfs-cache-max-size=10G
              - --vfs-cache-poll-interval=30s
              - --vfs-read-chunk-size=32M
              - --vfs-read-chunk-size-limit=128M
              - --vfs-fast-fingerprint
              - --no-modtime
              - --no-checksum
              - --log-level=info
              - --log-format=shortfile
            env:
              RCLONE_CONFIG_ALTMOUNT_TYPE: webdav
              RCLONE_CONFIG_ALTMOUNT_URL: http://altmount.media.svc.cluster.local:8080/webdav
              RCLONE_CONFIG_ALTMOUNT_VENDOR: other
              RCLONE_CONFIG_ALTMOUNT_USER:
                valueFrom:
                  secretKeyRef:
                    name: webdav-nfs-gateway-secret
                    key: WEBDAV_USER
              RCLONE_CONFIG_ALTMOUNT_PASS:
                valueFrom:
                  secretKeyRef:
                    name: webdav-nfs-gateway-secret
                    key: WEBDAV_PASS
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -r /data/altmount/version.txt && cat /data/altmount/version.txt >/dev/null
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -r /data/altmount/version.txt && cat /data/altmount/version.txt >/dev/null
                  initialDelaySeconds: 5
                  periodSeconds: 15
                  timeoutSeconds: 10
                  failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
                add:
                  - SYS_ADMIN
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 2Gi
          nfs:
            image:
              repository: ghcr.io/herobrauni/nfs-server
              tag: latest@sha256:TODO
            env:
              EXPORT_PATH: /data/altmount
              EXPORT_OPTS: "*(ro,fsid=0,async,no_subtree_check,no_auth_nlm,insecure,no_root_squash)"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - exportfs -v | grep -q /data/altmount
                  initialDelaySeconds: 5
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - exportfs -v | grep -q /data/altmount
                  initialDelaySeconds: 3
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
                add:
                  - SYS_ADMIN
                  - DAC_READ_SEARCH
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: webdav-nfs-gateway
        type: ClusterIP
        ports:
          nfs:
            enabled: true
            port: 2049
            protocol: TCP
    persistence:
      data:
        type: emptyDir
        globalMounts:
          - path: /data
      rclone-cache:
        type: emptyDir
        globalMounts:
          - path: /tmp/rclone
