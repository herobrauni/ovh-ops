---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app radarr
spec:
  chartRef:
    kind: OCIRepository
    name: radarr
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      radarr:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
          secret.reloader.stakater.com/reload: radarr-secret,radarr-pguser-secret
        initContainers:
          01-init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
            envFrom:
              - secretRef:
                  name: radarr-initdb-secret
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/radarr
              tag: 6.2.0.10390@sha256:be596a2f896fdf15077af027f44500f73e1f6fb7b450a6494b37dd25b7cc5927
            env:
              RADARR__AUTH__METHOD: External
              RADARR__AUTH__REQUIRED: DisabledForLocalAddresses
              RADARR__INSTANCENAME: Radarr
              RADARR__PORT: &port 7878
              RADARR__LOG__LEVEL: info
              RADARR__THEME: dark
              RADARR__LOG__DBENABLED: "False"
              RADARR__POSTGRES__HOST:
                valueFrom:
                  secretKeyRef:
                    name: &pguser radarr-pguser-secret
                    key: host
              RADARR__POSTGRES__MAINDB:
                valueFrom:
                  secretKeyRef:
                    name: *pguser
                    key: db
              RADARR__POSTGRES__PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: *pguser
                    key: password
              RADARR__POSTGRES__PORT:
                valueFrom:
                  secretKeyRef:
                    name: *pguser
                    key: port
              RADARR__POSTGRES__USER:
                valueFrom:
                  secretKeyRef:
                    name: *pguser
                    key: user
            envFrom:
              - secretRef:
                  name: radarr-secret
            # probes:
            #   liveness: &probes
            #     enabled: true
            #     custom: true
            #     spec:
            #       exec:
            #         command:
            #           - /bin/sh
            #           - -c
            #           - test -r /aio/altmount/version.txt && cat /aio/altmount/version.txt >/dev/null && curl -fsS http://127.0.0.1:7878/ping >/dev/null
            #       initialDelaySeconds: 30
            #       periodSeconds: 30
            #       timeoutSeconds: 10
            #       failureThreshold: 6
            #   readiness:
            #     enabled: true
            #     custom: true
            #     spec:
            #       exec:
            #         command:
            #           - /bin/sh
            #           - -c
            #           - test -r /aio/altmount/version.txt && cat /aio/altmount/version.txt >/dev/null && curl -fsS http://127.0.0.1:7878/ping >/dev/null
            #       initialDelaySeconds: 30
            #       periodSeconds: 15
            #       timeoutSeconds: 10
            #       failureThreshold: 6
            #   startup:
            #     enabled: true
            #     custom: true
            #     spec:
            #       httpGet:
            #         path: /ping
            #         port: *port
            #       failureThreshold: 30
            #       periodSeconds: 10
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    service:
      app:
        controller: radarr
        ports:
          http:
            port: 80
            targetPort: *port
    persistence:
      config:
        existingClaim: radarr
      tmp:
        type: emptyDir
      symlinks:
        existingClaim: symlinks
        globalMounts:
          - path: /aio/symlinks
