---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: profilarr-brauni-dev
spec:
  hostnames:
    - profilarr.brauni.dev
  parentRefs:
    - name: envoy-brauni-dev-public
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: profilarr
          port: 6868
