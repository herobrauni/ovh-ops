---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./ocirepository.yaml
  - ./externalsecret.yaml
  - ./helmrelease.yaml
configMapGenerator:
  - name: kometa-config
    files:
      - config.yml=./configs/config.yml
      - overlays.yml=./configs/overlays.yml
generatorOptions:
  disableNameSuffixHash: true
