---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kometa
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  target:
    name: kometa-secret
    creationPolicy: Owner
    template:
      data:
        PLEX_URL: "{{ .PLEX_URL }}"
        PLEX_TOKEN: "{{ .PLEX_TOKEN }}"
        TMDB_API_KEY: "{{ .TMDB_API_KEY }}"
        OMDB_API_KEY: "{{ .OMDB_API_KEY }}"
        TRAKT_CLIENT_ID: "{{ .TRAKT_CLIENT_ID }}"
        TRAKT_CLIENT_SECRET: "{{ .TRAKT_CLIENT_SECRET }}"
        TRAKT_ACCESS_TOKEN: "{{ .TRAKT_ACCESS_TOKEN }}"
        TRAKT_REFRESH_TOKEN: "{{ .TRAKT_REFRESH_TOKEN }}"
        TRAKT_EXPIRES_IN: "{{ .TRAKT_EXPIRES_IN }}"
        TRAKT_CREATED_AT: "{{ .TRAKT_CREATED_AT }}"
  dataFrom:
    - extract:
        key: kometa
    - extract:
        key: bitmagnet