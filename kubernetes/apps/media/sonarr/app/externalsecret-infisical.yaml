---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: servarr-infisical
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: servarr-infisical
    creationPolicy: Owner
    template:
      data:
        SONARR__AUTH__APIKEY: "{{ .API_KEY }}"
  data:
    - secretKey: API_KEY
      remoteRef:
        key: /servarr/API_KEY
