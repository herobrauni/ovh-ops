---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app sonarr
spec:
  chartRef:
    kind: OCIRepository
    name: sonarr
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      sonarr:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
          secret.reloader.stakater.com/reload: sonarr-secret,sonarr-pguser-secret
        initContainers:
          01-init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
            envFrom:
              - secretRef:
                  name: sonarr-initdb-secret
        containers:
          app:
            image:
              repository: ghcr.io/realzombee/sonarr
              tag: 4.1.1.824@sha256:41496344eaba38f679f238a1bb7a2aa79ea2c627e20eec8716582cc518a89554
            env:
              PUID: "1000"
              PGID: "1000"
              ACCEPT_RELEASE_ANY_UPGRADABLE: true
              IGNORE_MATCH_BY_ID_WARNING: true
              FIX_ANIME_SEASON_SEARCH: true
              SONARR__APP__INSTANCENAME: Sonarr
              SONARR__APP__THEME: dark
              SONARR__AUTH__METHOD: External
              SONARR__AUTH__REQUIRED: DisabledForLocalAddresses
              SONARR__LOG__DBENABLED: "False"
              SONARR__LOG__LEVEL: info
              SONARR__POSTGRES__HOST:
                valueFrom:
                  secretKeyRef:
                    name: &pguser sonarr-pguser-secret
                    key: host
              SONARR__POSTGRES__MAINDB:
                valueFrom:
                  secretKeyRef:
                    name: *pguser
                    key: db
              SONARR__POSTGRES__PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: *pguser
                    key: password
              SONARR__POSTGRES__PORT:
                valueFrom:
                  secretKeyRef:
                    name: *pguser
                    key: port
              SONARR__POSTGRES__USER:
                valueFrom:
                  secretKeyRef:
                    name: *pguser
                    key: user
              SONARR__SERVER__PORT: &port 80
              SONARR__UPDATE__BRANCH: develop
            envFrom:
              - secretRef:
                  name: sonarr-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  timeoutSeconds: 10
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: *port
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
                add:
                  - SETUID
                  - SETGID
                  - CHOWN
                  - DAC_OVERRIDE
                  - FOWNER
          rclone-altmount:
            image:
              repository: docker.io/rclone/rclone
              tag: 1.74@sha256:623378ad0ff3ebd5cebf77720843c0e02edfe46e2d5b5ac6bed54c6371780dfb
            command:
              - /bin/sh
              - -c
              - |
                umount -l /host-mount/rclone-sonarr-altmount 2>/dev/null || true
                mkdir -p /host-mount/rclone-sonarr-altmount
                exec rclone mount altmount:/ /host-mount/rclone-sonarr-altmount \
                  --dir-cache-time=20s \
                  --vfs-cache-mode=minimal \
                  --vfs-cache-max-age=24h \
                  --vfs-cache-max-size=20G \
                  --vfs-cache-poll-interval=30s \
                  --buffer-size=0M \
                  --vfs-read-ahead=512M \
                  --vfs-fast-fingerprint \
                  --links \
                  --use-cookies \
                  --no-modtime \
                  --no-checksum \
                  --allow-other \
                  --cache-dir=/cache
            env:
              RCLONE_CONFIG_ALTMOUNT_TYPE: webdav
              RCLONE_CONFIG_ALTMOUNT_URL: http://altmount.media.svc.cluster.local:8080/webdav/
              RCLONE_CONFIG_ALTMOUNT_VENDOR: other
            envFrom:
              - secretRef:
                  name: rclone-altmount-secret
            probes:
              liveness: &rclone-altmount-probes
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -d /host-mount/rclone-sonarr-altmount/complete
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *rclone-altmount-probes
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -d /host-mount/rclone-sonarr-altmount/complete
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              privileged: true
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    service:
      app:
        controller: sonarr
        ports:
          http:
            port: *port
    persistence:
      config:
        existingClaim: sonarr
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      symlinks:
        existingClaim: symlinks
        globalMounts:
          - path: /aio/symlinks
      fuse:
        type: hostPath
        hostPath: /dev/fuse
        hostPathType: CharDevice
        advancedMounts:
          sonarr:
            rclone-altmount:
              - path: /dev/fuse
      rclone-cache-altmount:
        type: emptyDir
        advancedMounts:
          sonarr:
            rclone-altmount:
              - path: /cache
      host-tmp:
        type: hostPath
        hostPath: /tmp
        hostPathType: Directory
        advancedMounts:
          sonarr:
            rclone-altmount:
              - path: /host-mount
                mountPropagation: Bidirectional
      altmount:
        type: hostPath
        hostPath: /tmp/rclone-sonarr-altmount
        hostPathType: DirectoryOrCreate
        advancedMounts:
          sonarr:
            app:
              - path: /aio/remote/altmount
                mountPropagation: HostToContainer
