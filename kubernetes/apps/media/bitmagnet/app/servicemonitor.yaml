---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: bitmagnet
spec:
  endpoints:
    - port: http
      path: /metrics
      honorLabels: true
      interval: 30s
  namespaceSelector:
    matchNames:
      - media
  selector:
    matchLabels:
      app.kubernetes.io/name: bitmagnet
