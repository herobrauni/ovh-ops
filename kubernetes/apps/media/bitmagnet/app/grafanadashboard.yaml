---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: bitmagnet
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
    - datasourceName: victoria-logs
      inputName: DS_VICTORIALOGS
  configMapRef:
    name: bitmagnet-dashboard
    key: bitmagnet.json
