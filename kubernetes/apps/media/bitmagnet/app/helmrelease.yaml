---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app bitmagnet
spec:
  chartRef:
    kind: OCIRepository
    name: bitmagnet
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      bitmagnet:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
          secret.reloader.stakater.com/reload: bitmagnet-secret,bitmagnet-initdb-secret,bitmagnet-pguser-secret
        initContainers:
          01-init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
            envFrom:
              - secretRef:
                  name: bitmagnet-initdb-secret
        containers:
          app:
            image:
              repository: ghcr.io/bitmagnet-io/bitmagnet
              tag: v0.10.0@sha256:cf2c16fac5b51f1c18e630b4710175d35d7e44b83012cfd05a2b43712feec05e
            command:
              - bitmagnet
            args:
              - worker
              - run
              - --all
            env:
              HOME: /config
              XDG_CONFIG_HOME: /config
              XDG_DATA_HOME: /data
              POSTGRES_HOST:
                valueFrom:
                  secretKeyRef:
                    name: &pguser bitmagnet-pguser-secret
                    key: host
              POSTGRES_NAME:
                valueFrom:
                  secretKeyRef:
                    name: *pguser
                    key: db
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: *pguser
                    key: password
              POSTGRES_PORT:
                valueFrom:
                  secretKeyRef:
                    name: *pguser
                    key: port
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: *pguser
                    key: user
            envFrom:
              - secretRef:
                  name: bitmagnet-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /status
                    port: &targetPort 3333
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /status
                    port: *targetPort
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /status
                    port: *targetPort
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    service:
      app:
        controller: bitmagnet
        ports:
          http:
            port: 80
            targetPort: *targetPort
    persistence:
      config:
        existingClaim: bitmagnet
        advancedMounts:
          bitmagnet:
            app:
              - path: /config
                subPath: config
              - path: /data
                subPath: data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
