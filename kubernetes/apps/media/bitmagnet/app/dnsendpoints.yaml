---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: bitmagnet
  annotations:
    dns.scope: all
spec:
  endpoints:
    - dnsName: bitmagnet.brauni.dev
      recordType: CNAME
      targets:
        - public.brauni.dev
    - dnsName: bitmagnet.riki.boo
      recordType: CNAME
      targets:
        - public.riki.boo
