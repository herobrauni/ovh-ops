---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app decypharr-sync-helper
spec:
  chartRef:
    kind: OCIRepository
    name: decypharr-sync-helper
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      decypharr-sync-helper:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/herobrauni/decypharr-sync-helper
              tag: latest@sha256:00ba74e49cadd74dbe74dae79d67b211695668bbeb5ff1278d3a8d41e2064717
            env:
              TZ: Europe/Berlin
              QB_SYNC_BASE_URL: "http://decypharr.media.svc.cluster.local:8282"
              QB_SYNC_CATEGORY: "other"
              QB_SYNC_DEST_PATH: "/aio/symlinks/other"
              QB_SYNC_POLL_INTERVAL: "60s"
              QB_SYNC_OPERATION: "hardlink"
              QB_SYNC_CROSS_DEVICE_FALLBACK: "error"
              QB_SYNC_DELETE_TORRENT: "true"
              QB_SYNC_DELETE_FILES: "false"
              QB_SYNC_PRESERVE_SUBFOLDER: "true"
              QB_SYNC_PLEX_ENABLED: "true"
              QB_SYNC_PLEX_URL: "http://plex.media.svc.cluster.local:32400"
              QB_SYNC_PLEX_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: decypharr-sync-helper-secret
                    key: QB_SYNC_PLEX_TOKEN
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
          rclone-realdebrid:
            image:
              repository: docker.io/rclone/rclone
              tag: 1.74@sha256:eb8788b795f0009324e9572b0e2acb9b56885327c2746b07d67a9d3b893a6602
            command:
              - /bin/sh
              - -c
              - |
                umount -l /host-mount/rclone-decypharr-sync-helper 2>/dev/null || true
                mkdir -p /host-mount/rclone-decypharr-sync-helper
                exec rclone mount realdebrid:/ /host-mount/rclone-decypharr-sync-helper \
                  --dir-cache-time=20s \
                  --vfs-cache-mode=full \
                  --vfs-cache-max-age=24h \
                  --vfs-cache-max-size=20G \
                  --vfs-cache-poll-interval=30s \
                  --buffer-size=0M \
                  --vfs-read-ahead=512M \
                  --vfs-fast-fingerprint \
                  --links \
                  --use-cookies \
                  --no-modtime \
                  --no-checksum \
                  --allow-other \
                  --cache-dir=/cache
            env:
              RCLONE_CONFIG_REALDEBRID_TYPE: webdav
              RCLONE_CONFIG_REALDEBRID_URL: http://decypharr.media.svc.cluster.local:8282/webdav
              RCLONE_CONFIG_REALDEBRID_VENDOR: other
            probes:
              liveness: &rclone-probes
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -f /host-mount/rclone-decypharr-sync-helper/version.txt
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *rclone-probes
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -f /host-mount/rclone-decypharr-sync-helper/version.txt
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              privileged: true
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
          rclone-nzbdav:
            image:
              repository: docker.io/rclone/rclone
              tag: 1.74@sha256:eb8788b795f0009324e9572b0e2acb9b56885327c2746b07d67a9d3b893a6602
            command:
              - /bin/sh
              - -c
              - |
                umount -l /host-mount/rclone-decypharr-sync-helper-nzbdav 2>/dev/null || true
                mkdir -p /host-mount/rclone-decypharr-sync-helper-nzbdav
                exec rclone mount nzbdav:/ /host-mount/rclone-decypharr-sync-helper-nzbdav \
                  --dir-cache-time=20s \
                  --vfs-cache-mode=full \
                  --vfs-cache-max-age=24h \
                  --vfs-cache-max-size=20G \
                  --vfs-cache-poll-interval=30s \
                  --buffer-size=0M \
                  --vfs-read-ahead=512M \
                  --vfs-fast-fingerprint \
                  --links \
                  --use-cookies \
                  --no-modtime \
                  --no-checksum \
                  --allow-other \
                  --cache-dir=/cache
            env:
              RCLONE_CONFIG_NZBDAV_TYPE: webdav
              RCLONE_CONFIG_NZBDAV_URL: http://nzbdav.media.svc.cluster.local:3000/
              RCLONE_CONFIG_NZBDAV_VENDOR: other
              RCLONE_CONFIG_NZBDAV_USER: usenet
            probes:
              liveness: &rclone-nzbdav-probes
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -f /host-mount/rclone-decypharr-sync-helper-nzbdav/README
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *rclone-nzbdav-probes
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -f /host-mount/rclone-decypharr-sync-helper-nzbdav/README
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              privileged: true
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      symlinks:
        existingClaim: symlinks
        globalMounts:
          - path: /aio/symlinks
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      fuse:
        type: hostPath
        hostPath: /dev/fuse
        hostPathType: CharDevice
        advancedMounts:
          decypharr-sync-helper:
            rclone-realdebrid:
              - path: /dev/fuse
            rclone-nzbdav:
              - path: /dev/fuse
      rclone-cache-realdebrid:
        type: emptyDir
        advancedMounts:
          decypharr-sync-helper:
            rclone-realdebrid:
              - path: /cache
      rclone-cache-nzbdav:
        type: emptyDir
        advancedMounts:
          decypharr-sync-helper:
            rclone-nzbdav:
              - path: /cache
      host-tmp:
        type: hostPath
        hostPath: /tmp
        hostPathType: Directory
        advancedMounts:
          decypharr-sync-helper:
            rclone-realdebrid:
              - path: /host-mount
                mountPropagation: Bidirectional
            rclone-nzbdav:
              - path: /host-mount
                mountPropagation: Bidirectional
      realdebrid:
        type: hostPath
        hostPath: /tmp/rclone-decypharr-sync-helper
        hostPathType: DirectoryOrCreate
        advancedMounts:
          decypharr-sync-helper:
            app:
              - path: /aio/remote/realdebrid
                mountPropagation: HostToContainer
      nzbdav:
        type: hostPath
        hostPath: /tmp/rclone-decypharr-sync-helper-nzbdav
        hostPathType: DirectoryOrCreate
        advancedMounts:
          decypharr-sync-helper:
            app:
              - path: /aio/remote/nzbdav
                mountPropagation: HostToContainer
