---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
spec:
  chartRef:
    kind: OCIRepository
    name: jellyfin
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups:
          - 44
    controllers:
      jellyfin:
        annotations:
          reloader.stakater.com/auto: "true"
          secret.reloader.stakater.com/reload: jellyfin-pguser-secret
        initContainers:
          01-init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
            envFrom:
              - secretRef:
                  name: jellyfin-initdb-secret
        containers:
          app:
            image:
              repository: ghcr.io/jpvenson/jellyfin.pgsql
              tag: 10.11.8-1@sha256:1a0364bf1e8dff72df30bdbbb3efedfdf4a5b224790220ead0a4709f964fdf4e
            env:
              JELLYFIN_PublishedServerUrl: https://jellyfin.480p.com
              POSTGRES_HOST:
                valueFrom:
                  secretKeyRef:
                    name: &pguser jellyfin-pguser-secret
                    key: host
              POSTGRES_PORT:
                valueFrom:
                  secretKeyRef:
                    name: *pguser
                    key: port
              POSTGRES_DB:
                valueFrom:
                  secretKeyRef:
                    name: *pguser
                    key: db
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: *pguser
                    key: user
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: *pguser
                    key: password
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 8096
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  timeoutSeconds: 10
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
          rclone:
            image:
              repository: docker.io/rclone/rclone
              tag: 1.69.3@sha256:1f497a86a6466395e62a5886613a14b7b18809543566ef9fa35fa1371a7ecc0f
            command:
              - /bin/sh
              - -c
              - |
                umount -l /host-mount/rclone-jellyfin 2>/dev/null || true
                mkdir -p /host-mount/rclone-jellyfin
                exec rclone mount altmount:/ /host-mount/rclone-jellyfin \
                  --read-only \
                  --dir-cache-time=10s \
                  --vfs-cache-mode=full \
                  --vfs-cache-max-age=504h \
                  --vfs-cache-max-size=10G \
                  --vfs-cache-poll-interval=30s \
                  --vfs-read-chunk-size=32M \
                  --vfs-read-chunk-size-limit=128M \
                  --vfs-fast-fingerprint \
                  --no-modtime \
                  --no-checksum \
                  --allow-other \
                  --cache-dir=/cache
            env:
              RCLONE_CONFIG_ALTMOUNT_TYPE: webdav
              RCLONE_CONFIG_ALTMOUNT_URL: http://altmount.media.svc.cluster.local:8080/webdav
              RCLONE_CONFIG_ALTMOUNT_VENDOR: other
              RCLONE_CONFIG_ALTMOUNT_USER: usenet
              RCLONE_CONFIG_ALTMOUNT_PASS: e4u2vK8IfaSPI_NKEPNbVpgwSqEGXQ
            probes:
              liveness: &rclone-probes
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -d /host-mount/rclone-jellyfin
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *rclone-probes
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -d /host-mount/rclone-jellyfin
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              privileged: true
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    service:
      app:
        controller: jellyfin
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Media
          gethomepage.dev/name: Jellyfin
          gethomepage.dev/pod-selector: app.kubernetes.io/name=jellyfin
          gethomepage.dev/icon: jellyfin.png
        hostnames:
          - jellyfin.480p.com
          - jelly.480p.com
        parentRefs:
          - name: envoy-480p-com-public
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: jellyfin
                port: *port
    persistence:
      config:
        existingClaim: jellyfin
      cache:
        existingClaim: jellyfin-cache
      logs:
        type: emptyDir
      transcode:
        type: emptyDir
      tmp:
        type: emptyDir
      symlinks:
        existingClaim: symlinks
        globalMounts:
          - path: /aio/symlinks
      fuse:
        type: hostPath
        hostPath: /dev/fuse
        hostPathType: CharDevice
        advancedMounts:
          jellyfin:
            rclone:
              - path: /dev/fuse
      rclone-cache:
        type: emptyDir
        advancedMounts:
          jellyfin:
            rclone:
              - path: /cache
      host-tmp:
        type: hostPath
        hostPath: /tmp
        hostPathType: Directory
        advancedMounts:
          jellyfin:
            rclone:
              - path: /host-mount
                mountPropagation: Bidirectional
      altmount:
        type: hostPath
        hostPath: /tmp/rclone-jellyfin
        hostPathType: DirectoryOrCreate
        advancedMounts:
          jellyfin:
            app:
              - path: /aio/altmount
                mountPropagation: HostToContainer
