---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app repair
spec:
  chartRef:
    kind: OCIRepository
    name: repair
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      repair:
        type: cronjob
        cronjob:
          schedule: "0 3 * * *"
          concurrencyPolicy: Forbid
          failedJobsHistory: 1
          successfulJobsHistory: 1
        containers:
          app:
            image:
              repository: ghcr.io/pukabyte/repair
              tag: latest@sha256:ef2490de1ead5d2866c5f8f21200b815792e72f3d88cde2bb53a8c9b965067bd
            env:
              REPAIR_MEDIA_LINKS_ROOT: /aio/symlinks
              REPAIR_DECYPHARR_MOUNT: /aio/altmount
              REPAIR_ARRS_FILE: /config/arrs.json
              REPAIR_WORKERS: "16"
              REPAIR_DELAY: "3.0"
              REPAIR_DRY_RUN: "true"
              REPAIR_VERIFY: "true"
              REPAIR_VERIFY_DEADLINE: "300"
              REPAIR_VERIFY_POLL: "15"
              REPAIR_PROBE_TIMEOUT: "20"
              REPAIR_HTTP_TIMEOUT: "60"
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
          rclone:
            image:
              repository: docker.io/rclone/rclone
              tag: 1.69.3@sha256:1f497a86a6466395e62a5886613a14b7b18809543566ef9fa35fa1371a7ecc0f
            command:
              - /bin/sh
              - -c
              - |
                umount -l /host-mount/rclone-repair 2>/dev/null || true
                mkdir -p /host-mount/rclone-repair
                exec rclone mount altmount:/ /host-mount/rclone-repair \
                  --read-only \
                  --dir-cache-time=10s \
                  --vfs-cache-mode=full \
                  --vfs-cache-max-age=504h \
                  --vfs-cache-max-size=10G \
                  --vfs-cache-poll-interval=30s \
                  --vfs-read-chunk-size=32M \
                  --vfs-read-chunk-size-limit=128M \
                  --vfs-fast-fingerprint \
                  --no-modtime \
                  --no-checksum \
                  --allow-other \
                  --cache-dir=/cache
            env:
              RCLONE_CONFIG_ALTMOUNT_TYPE: webdav
              RCLONE_CONFIG_ALTMOUNT_URL: http://altmount.media.svc.cluster.local:8080/webdav
              RCLONE_CONFIG_ALTMOUNT_VENDOR: other
              RCLONE_CONFIG_ALTMOUNT_USER: usenet
              RCLONE_CONFIG_ALTMOUNT_PASS: e4u2vK8IfaSPI_NKEPNbVpgwSqEGXQ
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              privileged: true
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      config:
        type: secret
        name: repair-secret
        globalMounts:
          - path: /config
            readOnly: true
      tmp:
        type: emptyDir
      symlinks:
        existingClaim: symlinks
        globalMounts:
          - path: /aio/symlinks
            readOnly: true
      fuse:
        type: hostPath
        hostPath: /dev/fuse
        hostPathType: CharDevice
        advancedMounts:
          repair:
            rclone:
              - path: /dev/fuse
      rclone-cache:
        type: emptyDir
        advancedMounts:
          repair:
            rclone:
              - path: /cache
      host-tmp:
        type: hostPath
        hostPath: /tmp
        hostPathType: Directory
        advancedMounts:
          repair:
            rclone:
              - path: /host-mount
                mountPropagation: Bidirectional
      altmount:
        type: hostPath
        hostPath: /tmp/rclone-repair
        hostPathType: DirectoryOrCreate
        advancedMounts:
          repair:
            app:
              - path: /aio/altmount
                mountPropagation: HostToContainer
