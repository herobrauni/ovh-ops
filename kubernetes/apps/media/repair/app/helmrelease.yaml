---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app repair
spec:
  chartRef:
    kind: OCIRepository
    name: repair
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      repair:
        type: cronjob
        cronjob:
          schedule: "0 3 * * *"
          concurrencyPolicy: Forbid
          failedJobsHistory: 1
          successfulJobsHistory: 1
        containers:
          app:
            image:
              repository: ghcr.io/pukabyte/repair
              tag: latest@sha256:ef2490de1ead5d2866c5f8f21200b815792e72f3d88cde2bb53a8c9b965067bd
            env:
              REPAIR_MEDIA_LINKS_ROOT: /aio/symlinks
              REPAIR_DECYPHARR_MOUNT: /aio/altmount
              REPAIR_ARRS_FILE: /config/arrs.json
              REPAIR_WORKERS: "16"
              REPAIR_DELAY: "3.0"
              REPAIR_DRY_RUN: "true"
              REPAIR_VERIFY: "true"
              REPAIR_VERIFY_DEADLINE: "300"
              REPAIR_VERIFY_POLL: "15"
              REPAIR_PROBE_TIMEOUT: "20"
              REPAIR_HTTP_TIMEOUT: "60"
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      config:
        type: secret
        name: repair-secret
        globalMounts:
          - path: /config
            readOnly: true
      tmp:
        type: emptyDir
      symlinks:
        existingClaim: symlinks
        globalMounts:
          - path: /aio/symlinks
            readOnly: true

