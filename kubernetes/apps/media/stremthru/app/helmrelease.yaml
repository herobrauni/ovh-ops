---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app stremthru
spec:
  chartRef:
    kind: OCIRepository
    name: stremthru
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      stremthru:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
          secret.reloader.stakater.com/reload: stremthru-secret,stremthru-initdb-secret,stremthru-pguser-secret
        initContainers:
          01-init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
            envFrom:
              - secretRef:
                  name: stremthru-initdb-secret
        containers:
          app:
            image:
              repository: docker.io/muniftanjim/stremthru
              tag: 0.102.2@sha256:4cf7829557148931fcb386d16cf2ae1fe97b38a2d46d4079089748d4eff1c692
            env:
              STREMTHRU_BASE_URL: https://stremthru.480p.com
              STREMTHRU_PORT: &targetPort 8080
              STREMTHRU_DATA_DIR: /app/data
              STREMTHRU_DATABASE_URI:
                valueFrom:
                  secretKeyRef:
                    name: &pguser stremthru-pguser-secret
                    key: uri
              STREMTHRU_REDIS_URI: redis://stremthru-dragonfly.media.svc.cluster.local:6379
            envFrom:
              - secretRef:
                  name: stremthru-secret
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
    service:
      app:
        controller: stremthru
        ports:
          http:
            port: 80
            targetPort: *targetPort
    persistence:
      config:
        existingClaim: stremthru
        globalMounts:
          - path: /app/data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
