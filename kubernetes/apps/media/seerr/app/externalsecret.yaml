---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seerr
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: seerr-secret
    creationPolicy: Owner
    template:
      data:
        API_KEY: "{{ .API_KEY }}"
  data:
    - secretKey: API_KEY
      remoteRef:
        key: /seerr/API_KEY
