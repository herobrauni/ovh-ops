---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: seerr
  annotations:
    dns.scope: all
spec:
  endpoints:
    - dnsName: requests.brauni.dev
      recordType: CNAME
      targets:
        - public.brauni.dev
    - dnsName: requests.riki.boo
      recordType: CNAME
      targets:
        - public.riki.boo
    - dnsName: requests.480p.com
      recordType: CNAME
      targets:
        - public.480p.com
