---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app umlautadaptarr
spec:
  chartRef:
    kind: OCIRepository
    name: umlautadaptarr
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      umlautadaptarr:
        annotations:
          reloader.stakater.com/auto: "true"
          secret.reloader.stakater.com/reload: umlautadaptarr-secret
        containers:
          app:
            image:
              repository: docker.io/pcjones/umlautadaptarr
              tag: 0.7.5@sha256:2c6689d49afe51fcaa5e8a27e139855e0c8782e1e42ec595d8694b74094f991f
            env:
              TZ: Europe/Berlin
              # Primary Sonarr instance
              SONARR__ENABLED: "true"
              SONARR__HOST: http://sonarr.media.svc.cluster.local
              # Secondary Sonarr instance (4k)
              SONARR__0__ENABLED: "true"
              SONARR__0__HOST: http://sonarr4k.media.svc.cluster.local
              # Primary Radarr instance
              RADARR__ENABLED: "true"
              RADARR__HOST: http://radarr.media.svc.cluster.local
              # Secondary Radarr instance (4k)
              RADARR__0__ENABLED: "true"
              RADARR__0__HOST: http://radarr4k.media.svc.cluster.local
              # Readarr / Lidarr not in use
              READARR__ENABLED: "false"
              LIDARR__ENABLED: "false"
              # Advanced settings
              SETTINGS__ProxyPort: &proxyPort 5006
              Kestrel__Endpoints__Http__Url: http://[::]:5005
            envFrom:
              - secretRef:
                  name: umlautadaptarr-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 5005
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    service:
      app:
        controller: umlautadaptarr
        ports:
          http:
            port: *port
          proxy:
            port: *proxyPort
    persistence:
      tmp:
        type: emptyDir
