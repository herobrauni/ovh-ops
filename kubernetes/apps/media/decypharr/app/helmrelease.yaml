---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: decypharr
spec:
  chartRef:
    kind: OCIRepository
    name: decypharr
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
    controllers:
      decypharr:
        forceRename: decypharr
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          setup-user:
            image:
              repository: cy01/blackhole
              tag: v2.4@sha256:21cbef95c9fd2625573d3e364b608d8ba912f58dd36d96b38c0c25c57064f098
            command:
              - /bin/sh
              - -ec
              - |
                cp -a /etc/. /mnt/etc/
                grep -q '^decypharr:x:1000:1000:' /mnt/etc/passwd || echo 'decypharr:x:1000:1000:decypharr:/app:/sbin/nologin' >> /mnt/etc/passwd
                grep -q '^decypharr:x:1000:' /mnt/etc/group || echo 'decypharr:x:1000:' >> /mnt/etc/group
                ln -sf /proc/self/mounts /mnt/etc/mtab
            securityContext:
              allowPrivilegeEscalation: false
              runAsGroup: 0
              runAsNonRoot: false
              runAsUser: 0
              capabilities: { drop: ["ALL"] }
        containers:
          app:
            image:
              repository: cy01/blackhole
              tag: v2.4@sha256:21cbef95c9fd2625573d3e364b608d8ba912f58dd36d96b38c0c25c57064f098
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            securityContext:
              privileged: true
              runAsGroup: 1000
              runAsNonRoot: true
              runAsUser: 1000
              capabilities:
                drop: ["ALL"]
    service:
      app:
        forceRename: decypharr
        controller: decypharr
        ports:
          http:
            port: &port 8282
    persistence:
      app:
        existingClaim: decypharr
        globalMounts:
          - path: /app
      aio:
        type: emptyDir
        globalMounts:
          - path: /aio
      symlinks:
        existingClaim: symlinks
        globalMounts:
          - path: /aio/symlinks
      etc-userdb:
        type: emptyDir
        advancedMounts:
          decypharr:
            setup-user:
              - path: /mnt/etc
            app:
              - path: /etc
      tmp:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /tmp
      dev-fuse:
        type: hostPath
        hostPath: /dev/fuse
        hostPathType: CharDevice
        globalMounts:
          - path: /dev/fuse
