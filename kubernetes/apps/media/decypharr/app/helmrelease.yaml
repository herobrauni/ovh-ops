---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: decypharr
spec:
  chartRef:
    kind: OCIRepository
    name: decypharr
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
    controllers:
      decypharr:
        forceRename: decypharr
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          setup-user:
            image:
              repository: cy01/blackhole
              tag: fenrir@sha256:a745746768a150f78dcf4495459ad634b5cc5c5e93eb1ddfb26db7002ebd8bcb
            command:
              - /bin/sh
              - -ec
              - |
                cp -a /etc/. /mnt/etc/
                grep -q '^decypharr:x:1000:1000:' /mnt/etc/passwd || echo 'decypharr:x:1000:1000:decypharr:/app:/sbin/nologin' >> /mnt/etc/passwd
                grep -q '^decypharr:x:1000:' /mnt/etc/group || echo 'decypharr:x:1000:' >> /mnt/etc/group
            securityContext:
              allowPrivilegeEscalation: false
              runAsGroup: 0
              runAsNonRoot: false
              runAsUser: 0
              capabilities: { drop: ["ALL"] }
        containers:
          app:
            image:
              repository: cy01/blackhole
              tag: fenrir@sha256:a745746768a150f78dcf4495459ad634b5cc5c5e93eb1ddfb26db7002ebd8bcb
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            securityContext:
              allowPrivilegeEscalation: true
              privileged: true
              runAsGroup: 1000
              runAsNonRoot: true
              runAsUser: 1000
              capabilities:
                drop: ["ALL"]
                add: ["SYS_ADMIN", "MKNOD"]
    service:
      app:
        forceRename: decypharr
        controller: decypharr
        ports:
          http:
            port: &port 8282
    persistence:
      app:
        existingClaim: decypharr
        globalMounts:
          - path: /app
      aio:
        type: emptyDir
        globalMounts:
          - path: /aio
      symlinks:
        existingClaim: symlinks
        globalMounts:
          - path: /aio/symlinks
      etc-userdb:
        type: emptyDir
        advancedMounts:
          decypharr:
            setup-user:
              - path: /mnt/etc
            app:
              - path: /etc
      fuse:
        type: custom
        volumeSpec:
          hostPath:
            path: /dev/fuse
            type: CharDevice
        globalMounts:
          - path: /dev/fuse
      tmp:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /tmp
