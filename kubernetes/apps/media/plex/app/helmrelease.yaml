---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
spec:
  chartRef:
    kind: OCIRepository
    name: plex
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups:
          - 44
    controllers:
      plex:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/plex
              tag: 1.43.1.10611@sha256:a9c3723cb31cc9621df27cf5801184c290293adf1df2bfaea4b8b6fc01dbfd96
            env:
              PLEX_ADVERTISE_URL: https://plex.480p.com:443
            # probes:
            #   liveness: &probes
            #     enabled: true
            #     custom: true
            #     spec:
            #       exec:
            #         command:
            #           - /bin/sh
            #           - -c
            #           - test -r /aio/altmount/version.txt && cat /aio/altmount/version.txt >/dev/null && curl -fsS http://127.0.0.1:32400/identity >/dev/null
            #       initialDelaySeconds: 30
            #       periodSeconds: 30
            #       timeoutSeconds: 10
            #       failureThreshold: 6
            #   readiness:
            #     enabled: true
            #     custom: true
            #     spec:
            #       exec:
            #         command:
            #           - /bin/sh
            #           - -c
            #           - test -r /aio/altmount/version.txt && cat /aio/altmount/version.txt >/dev/null && curl -fsS http://127.0.0.1:32400/identity >/dev/null
            #       initialDelaySeconds: 30
            #       periodSeconds: 15
            #       timeoutSeconds: 10
            #       failureThreshold: 6
            #   startup:
            #     enabled: true
            #     spec:
            #       failureThreshold: 30
            #       periodSeconds: 10
            #       tcpSocket:
            #         port: 32400
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
          rclone-realdebrid:
            image:
              repository: docker.io/rclone/rclone
              tag: 1.74@sha256:eb8788b795f0009324e9572b0e2acb9b56885327c2746b07d67a9d3b893a6602
            command:
              - /bin/sh
              - -c
              - |
                umount -l /host-mount/rclone-plex 2>/dev/null || true
                mkdir -p /host-mount/rclone-plex
                exec rclone mount realdebrid:/ /host-mount/rclone-plex \
                  --dir-cache-time=20s \
                  --vfs-cache-mode=full \
                  --vfs-cache-max-age=24h \
                  --vfs-cache-max-size=20G \
                  --vfs-cache-poll-interval=30s \
                  --buffer-size=0M \
                  --vfs-read-ahead=512M \
                  --vfs-fast-fingerprint \
                  --links \
                  --use-cookies \
                  --no-modtime \
                  --no-checksum \
                  --allow-other \
                  --cache-dir=/cache
            env:
              RCLONE_CONFIG_REALDEBRID_TYPE: webdav
              RCLONE_CONFIG_REALDEBRID_URL: http://decypharr.media.svc.cluster.local:8282/webdav
              RCLONE_CONFIG_REALDEBRID_VENDOR: other
            probes:
              liveness: &rclone-probes
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -f /host-mount/rclone-plex/version.txt
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *rclone-probes
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -f /host-mount/rclone-plex/version.txt
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              privileged: true
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
          rclone-nzbdav:
            image:
              repository: docker.io/rclone/rclone
              tag: 1.74@sha256:eb8788b795f0009324e9572b0e2acb9b56885327c2746b07d67a9d3b893a6602
            command:
              - /bin/sh
              - -c
              - |
                umount -l /host-mount/rclone-plex-nzbdav 2>/dev/null || true
                mkdir -p /host-mount/rclone-plex-nzbdav
                exec rclone mount nzbdav:/ /host-mount/rclone-plex-nzbdav \
                  --dir-cache-time=20s \
                  --vfs-cache-mode=full \
                  --vfs-cache-max-age=24h \
                  --vfs-cache-max-size=20G \
                  --vfs-cache-poll-interval=30s \
                  --buffer-size=0M \
                  --vfs-read-ahead=512M \
                  --vfs-fast-fingerprint \
                  --links \
                  --use-cookies \
                  --no-modtime \
                  --no-checksum \
                  --allow-other \
                  --cache-dir=/cache
            env:
              RCLONE_CONFIG_NZBDAV_TYPE: webdav
              RCLONE_CONFIG_NZBDAV_URL: http://nzbdav.media.svc.cluster.local:3000/
              RCLONE_CONFIG_NZBDAV_VENDOR: other
              RCLONE_CONFIG_NZBDAV_USER: usenet
            probes:
              liveness: &rclone-nzbdav-probes
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -f /host-mount/rclone-plex-nzbdav/README
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *rclone-nzbdav-probes
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -f /host-mount/rclone-plex-nzbdav/README
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              privileged: true
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    service:
      app:
        controller: plex
        ports:
          http:
            port: 32400
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 401"]
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Media
          gethomepage.dev/name: Plex
          gethomepage.dev/pod-selector: app.kubernetes.io/name=plex
          gethomepage.dev/icon: plex.png
        hostnames:
          - plex.480p.com
        parentRefs:
          - name: envoy-480p-com-public
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: plex
                port: 32400
            filters:
              - type: RequestHeaderModifier
                requestHeaderModifier:
                  remove:
                    - Range
            matches:
              - path:
                  type: PathPrefix
                  value: /library/streams
          - backendRefs:
              - name: plex
                port: 32400
    persistence:
      config:
        existingClaim: plex
        globalMounts:
          - path: /config/Library/Application Support/Plex Media Server
      cache:
        existingClaim: plex-cache
        globalMounts:
          - path: /config/Library/Application Support/Plex Media Server/Cache
      logs:
        type: emptyDir
        globalMounts:
          - path: /config/Library/Application Support/Plex Media Server/Logs
      transcode:
        type: emptyDir
      tmp:
        type: emptyDir
      symlinks:
        existingClaim: symlinks
        globalMounts:
          - path: /aio/symlinks
      fuse:
        type: hostPath
        hostPath: /dev/fuse
        hostPathType: CharDevice
        advancedMounts:
          plex:
            rclone-realdebrid:
              - path: /dev/fuse
            rclone-nzbdav:
              - path: /dev/fuse
      rclone-cache-realdebrid:
        type: emptyDir
        advancedMounts:
          plex:
            rclone-realdebrid:
              - path: /cache
      rclone-cache-nzbdav:
        type: emptyDir
        advancedMounts:
          plex:
            rclone-nzbdav:
              - path: /cache
      host-tmp:
        type: hostPath
        hostPath: /tmp
        hostPathType: Directory
        advancedMounts:
          plex:
            rclone-realdebrid:
              - path: /host-mount
                mountPropagation: Bidirectional
            rclone-nzbdav:
              - path: /host-mount
                mountPropagation: Bidirectional
      realdebrid:
        type: hostPath
        hostPath: /tmp/rclone-plex
        hostPathType: DirectoryOrCreate
        advancedMounts:
          plex:
            app:
              - path: /aio/remote/realdebrid
                mountPropagation: HostToContainer
      nzbdav:
        type: hostPath
        hostPath: /tmp/rclone-plex-nzbdav
        hostPathType: DirectoryOrCreate
        advancedMounts:
          plex:
            app:
              - path: /aio/remote/nzbdav
                mountPropagation: HostToContainer

