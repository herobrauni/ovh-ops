---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
spec:
  chartRef:
    kind: OCIRepository
    name: plex
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups:
          - 44
    controllers:
      plex:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/plex
              tag: 1.43.1.10611@sha256:a9c3723cb31cc9621df27cf5801184c290293adf1df2bfaea4b8b6fc01dbfd96
            env:
              PLEX_ADVERTISE_URL: https://plex.480p.com:443
            # probes:
            #   liveness: &probes
            #     enabled: true
            #     custom: true
            #     spec:
            #       exec:
            #         command:
            #           - /bin/sh
            #           - -c
            #           - test -r /aio/altmount/version.txt && cat /aio/altmount/version.txt >/dev/null && curl -fsS http://127.0.0.1:32400/identity >/dev/null
            #       initialDelaySeconds: 30
            #       periodSeconds: 30
            #       timeoutSeconds: 10
            #       failureThreshold: 6
            #   readiness:
            #     enabled: true
            #     custom: true
            #     spec:
            #       exec:
            #         command:
            #           - /bin/sh
            #           - -c
            #           - test -r /aio/altmount/version.txt && cat /aio/altmount/version.txt >/dev/null && curl -fsS http://127.0.0.1:32400/identity >/dev/null
            #       initialDelaySeconds: 30
            #       periodSeconds: 15
            #       timeoutSeconds: 10
            #       failureThreshold: 6
            #   startup:
            #     enabled: true
            #     spec:
            #       failureThreshold: 30
            #       periodSeconds: 10
            #       tcpSocket:
            #         port: 32400
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
          rclone:
            image:
              repository: docker.io/rclone/rclone
              tag: 1.69.3@sha256:1f497a86a6466395e62a5886613a14b7b18809543566ef9fa35fa1371a7ecc0f
            command:
              - /bin/sh
              - -c
              - |
                umount -l /host-mount/rclone-plex 2>/dev/null || true
                mkdir -p /host-mount/rclone-plex
                exec rclone mount altmount:/ /host-mount/rclone-plex \
                  --read-only \
                  --dir-cache-time=10s \
                  --vfs-cache-mode=full \
                  --vfs-cache-max-age=504h \
                  --vfs-cache-max-size=10G \
                  --vfs-cache-poll-interval=30s \
                  --vfs-read-chunk-size=32M \
                  --vfs-read-chunk-size-limit=128M \
                  --vfs-fast-fingerprint \
                  --no-modtime \
                  --no-checksum \
                  --allow-other \
                  --cache-dir=/cache
            env:
              RCLONE_CONFIG_ALTMOUNT_TYPE: webdav
              RCLONE_CONFIG_ALTMOUNT_URL: http://altmount.media.svc.cluster.local:8080/webdav
              RCLONE_CONFIG_ALTMOUNT_VENDOR: other
              RCLONE_CONFIG_ALTMOUNT_USER: usenet
              RCLONE_CONFIG_ALTMOUNT_PASS: e4u2vK8IfaSPI_NKEPNbVpgwSqEGXQ
            probes:
              liveness: &rclone-probes
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -d /host-mount/rclone-plex
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *rclone-probes
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -d /host-mount/rclone-plex
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              privileged: true
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    service:
      app:
        controller: plex
        ports:
          http:
            port: 32400
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 401"]
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Media
          gethomepage.dev/name: Plex
          gethomepage.dev/pod-selector: app.kubernetes.io/name=plex
          gethomepage.dev/icon: plex.png
        hostnames:
          - plex.480p.com
        parentRefs:
          - name: envoy-480p-com-public
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: plex
                port: 32400
            filters:
              - type: RequestHeaderModifier
                requestHeaderModifier:
                  remove:
                    - Range
            matches:
              - path:
                  type: PathPrefix
                  value: /library/streams
          - backendRefs:
              - name: plex
                port: 32400
    persistence:
      config:
        existingClaim: plex
        globalMounts:
          - path: /config/Library/Application Support/Plex Media Server
      cache:
        existingClaim: plex-cache
        globalMounts:
          - path: /config/Library/Application Support/Plex Media Server/Cache
      logs:
        type: emptyDir
        globalMounts:
          - path: /config/Library/Application Support/Plex Media Server/Logs
      transcode:
        type: emptyDir
      tmp:
        type: emptyDir
      symlinks:
        existingClaim: symlinks
        globalMounts:
          - path: /aio/symlinks
      fuse:
        type: hostPath
        hostPath: /dev/fuse
        hostPathType: CharDevice
        advancedMounts:
          plex:
            rclone:
              - path: /dev/fuse
      rclone-cache:
        type: emptyDir
        advancedMounts:
          plex:
            rclone:
              - path: /cache
      host-tmp:
        type: hostPath
        hostPath: /tmp
        hostPathType: Directory
        advancedMounts:
          plex:
            rclone:
              - path: /host-mount
                mountPropagation: Bidirectional
      altmount:
        type: hostPath
        hostPath: /tmp/rclone-plex
        hostPathType: DirectoryOrCreate
        advancedMounts:
          plex:
            app:
              - path: /aio/altmount
                mountPropagation: HostToContainer
