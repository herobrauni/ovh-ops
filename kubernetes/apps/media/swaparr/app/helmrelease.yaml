---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app swaparr
spec:
  chartRef:
    kind: OCIRepository
    name: swaparr
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      swaparr:
        annotations:
          reloader.stakater.com/auto: "true"
          secret.reloader.stakater.com/reload: swaparr-secret
        containers:
          # radarr:
          #   image:
          #     repository: ghcr.io/thijmengthn/swaparr
          #     tag: 0.12.0@sha256:c7fd9327b173df20d73f93f3d74e3a20434b9c64df0cecdf72e3a96c32e6687c
          #   env:
          #     BASEURL: http://radarr.media.svc.cluster.local
          #     PLATFORM: radarr
          #     APIKEY:
          #       valueFrom:
          #         secretKeyRef:
          #           name: swaparr-secret
          #           key: RADARR_APIKEY
          #     MAX_STRIKES: "3"
          #     SCAN_INTERVAL: 10m
          #     MAX_DOWNLOAD_TIME: 2h
          #     IGNORE_ABOVE_SIZE: 25GB
          #     REMOVE_FROM_CLIENT: "true"
          #     STRIKE_QUEUED: "false"
          #     DRY_RUN: "false"
          #   probes:
          #     liveness: &liveness
          #       enabled: true
          #       custom: true
          #       spec:
          #         exec:
          #           command:
          #             - /bin/sh
          #             - -c
          #             - grep -q "1" /tmp/swaparr.health
          #         initialDelaySeconds: 30
          #         periodSeconds: 30
          #         timeoutSeconds: 5
          #         failureThreshold: 3
          #     readiness: &readiness
          #       enabled: true
          #       custom: true
          #       spec:
          #         exec:
          #           command:
          #             - /bin/sh
          #             - -c
          #             - grep -q "1" /tmp/swaparr.health
          #         initialDelaySeconds: 10
          #         periodSeconds: 15
          #         timeoutSeconds: 5
          #         failureThreshold: 2
          #   resources: &resources
          #     requests:
          #       cpu: 10m
          #       memory: 64Mi
          #     limits:
          #       memory: 256Mi
          #   securityContext: &securityContext
          #     allowPrivilegeEscalation: false
          #     readOnlyRootFilesystem: true
          #     capabilities:
          #       drop:
          #         - ALL
          # radarr4k:
          #   image:
          #     repository: ghcr.io/thijmengthn/swaparr
          #     tag: 0.12.0@sha256:c7fd9327b173df20d73f93f3d74e3a20434b9c64df0cecdf72e3a96c32e6687c
          #   env:
          #     BASEURL: http://radarr4k.media.svc.cluster.local
          #     PLATFORM: radarr
          #     APIKEY:
          #       valueFrom:
          #         secretKeyRef:
          #           name: swaparr-secret
          #           key: RADARR4K_APIKEY
          #     MAX_STRIKES: "3"
          #     SCAN_INTERVAL: 10m
          #     MAX_DOWNLOAD_TIME: 2h
          #     IGNORE_ABOVE_SIZE: 25GB
          #     REMOVE_FROM_CLIENT: "true"
          #     STRIKE_QUEUED: "false"
          #     DRY_RUN: "false"
          #   probes:
          #     liveness: *liveness
          #     readiness: *readiness
          #   resources: *resources
          #   securityContext: *securityContext
          sonarr:
            image:
              repository: ghcr.io/thijmengthn/swaparr
              tag: 0.12.0@sha256:c7fd9327b173df20d73f93f3d74e3a20434b9c64df0cecdf72e3a96c32e6687c
            env:
              BASEURL: http://sonarr.media.svc.cluster.local
              PLATFORM: sonarr
              APIKEY:
                valueFrom:
                  secretKeyRef:
                    name: swaparr-secret
                    key: SONARR_APIKEY
              MAX_STRIKES: "3"
              SCAN_INTERVAL: 10m
              MAX_DOWNLOAD_TIME: 2h
              IGNORE_ABOVE_SIZE: 25GB
              REMOVE_FROM_CLIENT: "true"
              STRIKE_QUEUED: "false"
              DRY_RUN: "false"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - grep -q "1" /tmp/swaparr.health
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - grep -q "1" /tmp/swaparr.health
                  initialDelaySeconds: 10
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 2
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
          # sonarr4k:
          #   image:
          #     repository: ghcr.io/thijmengthn/swaparr
          #     tag: 0.12.0@sha256:c7fd9327b173df20d73f93f3d74e3a20434b9c64df0cecdf72e3a96c32e6687c
          #   env:
          #     BASEURL: http://sonarr4k.media.svc.cluster.local
          #     PLATFORM: sonarr
          #     APIKEY:
          #       valueFrom:
          #         secretKeyRef:
          #           name: swaparr-secret
          #           key: SONARR4K_APIKEY
          #     MAX_STRIKES: "3"
          #     SCAN_INTERVAL: 10m
          #     MAX_DOWNLOAD_TIME: 2h
          #     IGNORE_ABOVE_SIZE: 25GB
          #     REMOVE_FROM_CLIENT: "true"
          #     STRIKE_QUEUED: "false"
          #     DRY_RUN: "false"
          #   probes:
          #     liveness: *liveness
          #     readiness: *readiness
          #   resources: *resources
          #   securityContext: *securityContext
    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
