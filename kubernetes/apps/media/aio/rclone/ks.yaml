---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: aio-rclone
spec:
  interval: 1h
  path: ./kubernetes/apps/media/aio/rclone/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  dependsOn:
    - name: decypharr
      namespace: media
    - name: csi-rclone
      namespace: csi-rclone
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: decypharr
      namespace: media
  wait: true
