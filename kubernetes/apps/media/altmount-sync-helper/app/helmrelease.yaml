---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app altmount-sync-helper
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      altmount-sync-helper:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/busybox
              tag: 1.37.0@sha256:026ed7273270ec08f6902b4ae8334c23b473e5394bec3bbbdbfe580c710d50bc
            command:
              - /bin/sh
              - /scripts/sync.sh
            env:
              TZ: Europe/Berlin
              WATCH_DIR: /aio/symlinks/complete/other
              DEST_DIR: /aio/symlinks/other
              POLL_INTERVAL: "60"
              PLEX_URL: "http://plex.media.svc.cluster.local:32400"
              PLEX_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: altmount-sync-helper-secret
                    key: PLEX_TOKEN
              PLEX_LIBRARY: "Other Videos"
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -f /tmp/heartbeat && test $(($(date +%s) - $(date -r /tmp/heartbeat +%s))) -lt 180
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -d /aio/symlinks/complete/other && test -d /aio/symlinks/other
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -f /tmp/heartbeat
                  initialDelaySeconds: 2
                  periodSeconds: 2
                  failureThreshold: 30
    persistence:
      symlinks:
        existingClaim: symlinks
        globalMounts:
          - path: /aio/symlinks
      scripts:
        type: configMap
        name: altmount-sync-helper-script
        globalMounts:
          - path: /scripts
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
