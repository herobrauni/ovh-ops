---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/kubernetes-json-schema/schema.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: altmount-sync-helper-script
data:
  sync.sh: |
    #!/bin/sh
    set -e

    WATCH_DIR="${WATCH_DIR:-/aio/symlinks/complete/other}"
    DEST_DIR="${DEST_DIR:-/aio/symlinks/other}"
    STATE_FILE="/tmp/processed.log"
    POLL_INTERVAL="${POLL_INTERVAL:-60}"

    PLEX_URL="${PLEX_URL:-http://plex.media.svc.cluster.local:32400}"
    PLEX_TOKEN="${PLEX_TOKEN:-}"
    PLEX_LIBRARY="${PLEX_LIBRARY:-Other Videos}"

    log() { echo "[$(date '+%Y-%m-%d %H:%M:%S')] $*"; }

    mkdir -p "$DEST_DIR"
    touch "$STATE_FILE"

    is_processed() { grep -qFx "$1" "$STATE_FILE" 2>/dev/null; }
    mark_processed() { echo "$1" >> "$STATE_FILE"; }

    sync_item() {
        local name="$1"
        local src="$WATCH_DIR/$name"
        local dest="$DEST_DIR/$name"

        is_processed "$name" && return 0
        [ ! -e "$src" ] && return 1

        log "Found new item: $name"

        if [ -d "$src" ]; then
            mkdir -p "$dest"
            cp -r "$src/." "$dest/" || {
                log "ERROR: Failed to copy directory: $name"
                rm -rf "$dest" 2>/dev/null || true
                return 1
            }
        else
            cp -r "$src" "$dest" || {
                log "ERROR: Failed to copy file: $name"
                rm -rf "$dest" 2>/dev/null || true
                return 1
            }
        fi

        log "Copied: $name -> $dest"

        # Remove from altmount queue by deleting the source
        rm -rf "$src"
        log "Removed from altmount queue: $name"

        mark_processed "$name"
        return 0
    }

    plex_refresh() {
        [ -z "$PLEX_TOKEN" ] && { log "WARN: PLEX_TOKEN not set — skipping Plex refresh"; return 0; }

        local response
        response=$(wget -qO- "${PLEX_URL}/library/sections?X-Plex-Token=${PLEX_TOKEN}" 2>/dev/null) || {
            log "WARN: Failed to reach Plex at ${PLEX_URL}"
            return 0
        }
        [ -z "$response" ] && { log "WARN: Empty response from Plex"; return 0; }

        # Validate we got a real Plex response (not an error page or empty container)
        if ! echo "$response" | grep -q 'MediaContainer' || echo "$response" | grep -q 'size="0"'; then
            log "WARN: Plex response invalid — check PLEX_URL and PLEX_TOKEN"
            return 0
        fi

        local key
        key=$(echo "$response" | sed -n "s/.*key=\"\([0-9]*\)\".*title=\"${PLEX_LIBRARY}\".*/\1/p" | head -1)

        if [ -n "$key" ]; then
            wget -qO- "${PLEX_URL}/library/sections/${key}/refresh?X-Plex-Token=${PLEX_TOKEN}" >/dev/null 2>&1
            log "Plex scan triggered: ${PLEX_LIBRARY} (section ${key})"
        else
            log "WARN: Plex library '${PLEX_LIBRARY}' not found"
        fi
    }

    # --- main ---
    log "altmount-sync-helper starting"
    log "Watch:  ${WATCH_DIR}"
    log "Dest:   ${DEST_DIR}"
    log "Poll:   ${POLL_INTERVAL}s"

    # Validate Plex connectivity on startup
    if [ -n "$PLEX_TOKEN" ]; then
        log "Validating Plex connection..."
        response=$(wget -qO- "${PLEX_URL}/library/sections?X-Plex-Token=${PLEX_TOKEN}" 2>/dev/null)
        if echo "$response" | grep -q 'MediaContainer' && ! echo "$response" | grep -q 'size="0"'; then
            log "Plex connection OK"
        else
            log "WARN: Plex validation failed — check PLEX_URL (${PLEX_URL}) and PLEX_TOKEN"
        fi
    else
        log "WARN: PLEX_TOKEN is empty — Plex refresh disabled"
    fi

    while true; do
        touch /tmp/heartbeat
        processed_any=false

        if [ -d "$WATCH_DIR" ]; then
            for item in "$WATCH_DIR"/*; do
                [ -e "$item" ] || continue
                name=$(basename "$item")
                if sync_item "$name"; then
                    processed_any=true
                fi
            done
        fi

        if [ "$processed_any" = "true" ]; then
            plex_refresh
        fi

        sleep "$POLL_INTERVAL"
    done
