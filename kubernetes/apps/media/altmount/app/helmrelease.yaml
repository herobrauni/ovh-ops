---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: altmount
spec:
  chartRef:
    kind: OCIRepository
    name: altmount
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      altmount:
        forceRename: altmount
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/javi11/altmount
              tag: v0.2.0@sha256:2592723a519248340e43fa5a564cff01f3faf24f680ba4d8a1ae84f2e87c2cd2
            env:
              PUID: "1000"
              PGID: "1000"
              PORT: &port 8080
              COOKIE_DOMAIN: altmount.480p.com
              JWT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: altmount-secret
                    key: JWT_SECRET
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            securityContext:
              allowPrivilegeEscalation: false
              runAsUser: 0
              runAsGroup: 0
              capabilities:
                drop: ["ALL"]
                add:
                  - SETUID
                  - SETGID
                  - CHOWN
    service:
      app:
        forceRename: altmount
        controller: altmount
        ports:
          http:
            port: *port
    persistence:
      config:
        existingClaim: altmount
        globalMounts:
          - path: /config
      symlinks:
        existingClaim: symlinks
        globalMounts:
          - path: /aio/symlinks
      altmount:
        type: custom
        volumeSpec:
          csi:
            driver: rclone.csi.veloxpack.io
            readOnly: true
            volumeAttributes:
              remote: altmount
              remotePath: "/"
              dir-cache-time: "10s"
              vfs-cache-mode: full
              vfs-cache-max-age: "504h"
              vfs-cache-max-size: "10G"
              vfs-cache-poll-interval: "30s"
              vfs-read-chunk-size: "32M"
              vfs-read-chunk-size-limit: "128M"
              vfs-fast-fingerprint: "true"
              no-modtime: "true"
              no-checksum: "true"
              read-only: "true"
              configData: |
                [altmount]
                type = webdav
                url = http://altmount.media.svc.cluster.local:8080/webdav
                vendor = other
                user = usenet
                pass = e4u2vK8IfaSPI_NKEPNbVpgwSqEGXQ
        globalMounts:
          - path: /aio/altmount
            readOnly: true
      tmp:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /tmp
