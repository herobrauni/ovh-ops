---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: altmount-480p-com
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Media
    gethomepage.dev/name: AltMount
    gethomepage.dev/pod-selector: app.kubernetes.io/name=altmount
    gethomepage.dev/icon: mdi-folder-sync-outline
spec:
  hostnames:
    - altmount.480p.com
  parentRefs:
    - name: envoy-480p-com-public
      namespace: network
      sectionName: https
  rules:
    # WebDAV path — no TinyAuth, uses altmount's own Basic Auth / JWT
    - matches:
        - path:
            type: PathPrefix
            value: /webdav
      backendRefs:
        - name: altmount
          port: 8080
    # Everything else — protected by TinyAuth
    - backendRefs:
        - name: altmount
          port: 8080
