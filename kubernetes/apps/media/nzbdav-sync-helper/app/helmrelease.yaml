---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app nzbdav-sync-helper
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      nzbdav-sync-helper:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/busybox
              tag: 1.38.0@sha256:7e2c04dd50ede647bf4a7a4c8dbd629dd4971cd139b9b88fb22bfc3c7a6c13df
            command:
              - /bin/sh
              - /scripts/sync.sh
            env:
              WATCH_DIR: /aio/remote/nzbdav/completed-symlinks/other
              DEST_DIR: /aio/symlinks/other
              POLL_INTERVAL: "60"
              NZBDAV_URL: "http://nzbdav.media.svc.cluster.local:3000"
              NZBDAV_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: nzbdav-sync-helper-secret
                    key: NZBDAV_API_KEY
              PLEX_URL: "http://plex.media.svc.cluster.local:32400"
              PLEX_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: nzbdav-sync-helper-secret
                    key: PLEX_TOKEN
              PLEX_LIBRARY: "Other Videos"
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
          rclone-altmount:
            image:
              repository: docker.io/rclone/rclone
              tag: 1.74@sha256:c61954aaa32328a5486715dd063a81c7879f5195ad3505cd362deddd509dc4a1
            command:
              - /bin/sh
              - -c
              - |
                umount -l /host-mount/rclone-nzbdav-sync-helper-altmount 2>/dev/null || true
                mkdir -p /host-mount/rclone-nzbdav-sync-helper-altmount
                exec rclone mount altmount:/ /host-mount/rclone-nzbdav-sync-helper-altmount \
                  --dir-cache-time=20s \
                  --vfs-cache-mode=full \
                  --vfs-cache-max-age=24h \
                  --vfs-cache-max-size=20G \
                  --vfs-cache-poll-interval=30s \
                  --buffer-size=0M \
                  --vfs-read-ahead=512M \
                  --vfs-fast-fingerprint \
                  --links \
                  --use-cookies \
                  --no-modtime \
                  --no-checksum \
                  --allow-other \
                  --cache-dir=/cache
            env:
              RCLONE_CONFIG_ALTMOUNT_TYPE: webdav
              RCLONE_CONFIG_ALTMOUNT_URL: http://altmount.media.svc.cluster.local:8080/webdav/
              RCLONE_CONFIG_ALTMOUNT_VENDOR: other
            envFrom:
              - secretRef:
                  name: rclone-altmount-secret
            probes:
              liveness: &rclone-altmount-probes
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -d /host-mount/rclone-nzbdav-sync-helper-altmount/complete
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *rclone-altmount-probes
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -d /host-mount/rclone-nzbdav-sync-helper-altmount/complete
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              privileged: true
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      symlinks:
        existingClaim: symlinks
        globalMounts:
          - path: /aio/symlinks
      scripts:
        type: configMap
        name: nzbdav-sync-helper-script
        globalMounts:
          - path: /scripts
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      fuse:
        type: hostPath
        hostPath: /dev/fuse
        hostPathType: CharDevice
        advancedMounts:
          nzbdav-sync-helper:
            rclone-altmount:
              - path: /dev/fuse
      rclone-cache-altmount:
        type: emptyDir
        advancedMounts:
          nzbdav-sync-helper:
            rclone-altmount:
              - path: /cache
      host-tmp:
        type: hostPath
        hostPath: /tmp
        hostPathType: Directory
        advancedMounts:
          nzbdav-sync-helper:
            rclone-altmount:
              - path: /host-mount
                mountPropagation: Bidirectional
      altmount:
        type: hostPath
        hostPath: /tmp/rclone-nzbdav-sync-helper-altmount
        hostPathType: DirectoryOrCreate
        advancedMounts:
          nzbdav-sync-helper:
            app:
              - path: /aio/remote/altmount
                mountPropagation: HostToContainer
