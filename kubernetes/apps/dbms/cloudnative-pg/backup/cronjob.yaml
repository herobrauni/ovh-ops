---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/batch/v1/cronjob.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres18-logical-backup
spec:
  schedule: "15 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
          containers:
            - name: postgres18-logical-backup
              image: docker.io/library/postgres:18
              imagePullPolicy: IfNotPresent
              command:
                - /bin/bash
                - -c
                - |-
                  set -euo pipefail
                  timestamp="$(date +%Y%m%d-%H%M%S)"
                  backup_file="/backup/postgres18-$${timestamp}.sql.gz"
                  pg_dumpall --clean --if-exists --quote-all-identifiers | gzip -9 > "$${backup_file}"
                  find /backup -type f -name 'postgres18-*.sql.gz' -mtime +14 -delete
              env:
                - name: PGHOST
                  value: postgres18-rw.dbms.svc.cluster.local
                - name: PGPORT
                  value: "5432"
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: cloudnative-pg-secret
                      key: username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: cloudnative-pg-secret
                      key: password
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: backup
                  mountPath: /backup
          restartPolicy: OnFailure
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: ${APP}
