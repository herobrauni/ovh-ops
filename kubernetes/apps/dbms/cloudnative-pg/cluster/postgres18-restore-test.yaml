---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres18-restore-test
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18
  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: switchover
  storage:
    size: 50Gi
    storageClass: openebs-hostpath
  bootstrap:
    recovery:
      backup:
        name: postgres18-manual-s3-20260314164149
  superuserSecret:
    name: cloudnative-pg-secret
  enableSuperuserAccess: true
  postgresql:
    parameters:
      max_connections: "400"
      max_locks_per_transaction: "128"
      shared_buffers: 256MB
      timescaledb.telemetry_level: "off"
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      memory: 12Gi
