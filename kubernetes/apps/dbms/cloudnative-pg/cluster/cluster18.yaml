---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres18
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:18
  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: switchover
  storage:
    size: 50Gi
    storageClass: ceph-block
  bootstrap:
    recovery:
      source: postgres18-v1
      volumeSnapshots:
        storage:
          name: postgres18-20260314000000
          kind: VolumeSnapshot
          apiGroup: snapshot.storage.k8s.io
  superuserSecret:
    name: cloudnative-pg-secret
  enableSuperuserAccess: true
  postgresql:
    parameters:
      max_connections: "400"
      max_locks_per_transaction: "128"
      shared_buffers: 256MB
      timescaledb.telemetry_level: "off"
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      memory: 12Gi
  monitoring:
    enablePodMonitor: true
  backup:
    retentionPolicy: 30d
    barmanObjectStore:
      destinationPath: s3://cnpg-backups/postgres18/v1/
      endpointURL: http://rook-ceph-rgw-proxmox-s3.rook-ceph.svc:80
      s3Credentials:
        accessKeyId:
          name: cnpg-backups
          key: AWS_ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-backups
          key: AWS_SECRET_ACCESS_KEY
      wal:
        compression: gzip
        maxParallel: 8
  externalClusters:
    - name: postgres18-v1
      barmanObjectStore:
        serverName: postgres18
        destinationPath: s3://cnpg-backups/postgres18/v1/
        endpointURL: http://rook-ceph-rgw-proxmox-s3.rook-ceph.svc:80
        s3Credentials:
          accessKeyId:
            name: cnpg-backups
            key: AWS_ACCESS_KEY_ID
          secretAccessKey:
            name: cnpg-backups
            key: AWS_SECRET_ACCESS_KEY
        wal:
          compression: gzip
          maxParallel: 8
