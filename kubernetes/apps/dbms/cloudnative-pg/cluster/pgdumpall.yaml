---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/v1/persistentvolumeclaim-v1.json
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres18-pgdumpall
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 35Gi
  storageClassName: ceph-block
---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/batch/v1/cronjob.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres18-pgdumpall-dump
spec:
  schedule: "30 0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      activeDeadlineSeconds: 9000
      template:
        spec:
          automountServiceAccountToken: false
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
          containers:
            - name: pgdumpall
              image: ghcr.io/cloudnative-pg/postgresql:18@sha256:5e30290fba3d990b08a9caea6ddb49c661ad8246cbb2688adad7e6cc78df6c3f
              command:
                - /bin/bash
                - -ec
                - |
                  set -euo pipefail

                  find /data -maxdepth 1 -type f -name 'postgres18-*.sql.gz.tmp' -delete
                  find /data -maxdepth 1 -type f -name 'postgres18-*.sql.gz' -delete

                  ts="$(date -u +%Y%m%dT%H%M%SZ)"
                  tmpfile="/data/postgres18-${ts}.sql.gz.tmp"
                  outfile="/data/postgres18-${ts}.sql.gz"

                  cleanup() {
                    rm -f "${tmpfile}"
                  }
                  trap cleanup EXIT

                  export PGPASSWORD="${PGPASSWORD}"
                  pg_dumpall --host="postgres18-rw.dbms.svc.cluster.local" --port="5432" --username="${PGUSER}" | gzip -9 > "${tmpfile}"

                  mv "${tmpfile}" "${outfile}"
                  trap - EXIT
              env:
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: cloudnative-pg-secret
                      key: username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: cloudnative-pg-secret
                      key: password
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: data
                  mountPath: /data
                - name: tmp
                  mountPath: /tmp
          restartPolicy: OnFailure
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: postgres18-pgdumpall
            - name: tmp
              emptyDir: {}
---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres18-pgdumpall-volsync
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  target:
    name: postgres18-pgdumpall-volsync-secret
    template:
      data:
        KOPIA_REPOSITORY: "{{ .KOPIA_REPOSITORY }}"
        KOPIA_PASSWORD: "{{ .KOPIA_PASSWORD }}"
        SFTP_HOST: "{{ .SFTP_HOST }}"
        SFTP_PORT: "{{ .SFTP_PORT }}"
        SFTP_USERNAME: "{{ .SFTP_USERNAME }}"
        SFTP_PATH: "{{ .SFTP_PATH }}"
        SFTP_KEY_FILE: "{{ .SFTP_KEY_FILE }}"
        SFTP_KNOWN_HOSTS_DATA: |-
          {{ .SFTP_KNOWN_HOSTS_DATA | replace "\\n" "\n" | replace " [" "\n[" }}
  dataFrom:
    - extract:
        key: volsync-template
    - extract:
        key: kopia_known_hosts
---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/volsync.backube/replicationsource_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: postgres18-pgdumpall
spec:
  sourcePVC: postgres18-pgdumpall
  trigger:
    schedule: 30 3 * * *
  kopia:
    accessModes:
      - ReadWriteOnce
    compression: zstd-fastest
    copyMethod: Snapshot
    moverSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 1000
    parallelism: 2
    repository: postgres18-pgdumpall-volsync-secret
    retain:
      latest: 10
      weekly: 6
      monthly: 6
      yearly: 2
    storageClassName: ceph-block
    volumeSnapshotClassName: csi-ceph-blockpool
---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/v1/persistentvolumeclaim-v1.json
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-pgdumpall
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 15Gi
