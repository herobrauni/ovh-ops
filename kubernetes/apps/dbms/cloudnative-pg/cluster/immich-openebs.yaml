---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-openebs
spec:
  instances: 1
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:18.3-1.1.1
  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: switchover
  storage:
    size: 20Gi
    storageClass: openebs-hostpath
  bootstrap:
    recovery:
      backup:
        name: immich-final-s3-20260314194250
  superuserSecret:
    name: cloudnative-pg-secret
  enableSuperuserAccess: true
  postgresql:
    shared_preload_libraries:
      - vchord.so
    parameters:
      max_connections: "400"
      max_locks_per_transaction: "128"
      shared_buffers: 256MB
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      memory: 12Gi
