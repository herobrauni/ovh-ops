---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich
spec:
  instances: 3
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:18.0-0.5.3
  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: switchover
  storage:
    size: 20Gi
    storageClass: ceph-block
  bootstrap:
    initdb:
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS vchord CASCADE;
  superuserSecret:
    name: cloudnative-pg-secret
  enableSuperuserAccess: true
  postgresql:
    shared_preload_libraries:
      - vchord.so
    parameters:
      max_connections: "400"
      max_locks_per_transaction: "128"
      shared_buffers: 256MB
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      memory: 12Gi
  monitoring:
    enablePodMonitor: true
  backup:
    retentionPolicy: 30d
    volumeSnapshot:
      className: csi-ceph-blockpool
