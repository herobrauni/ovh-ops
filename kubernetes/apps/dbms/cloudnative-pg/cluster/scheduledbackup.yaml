---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/postgresql.cnpg.io/scheduledbackup_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: postgres18
spec:
  schedule: "20 17 * * *"
  immediate: true
  backupOwnerReference: self
  method: barmanObjectStore
  cluster:
    name: postgres18
