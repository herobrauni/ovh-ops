---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nix-runner
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: nix-runner-secret
    template:
      data:
        github_app_id: "{{ .ACTIONS_RUNNER_APP_ID }}"
        github_app_installation_id: "{{ .ACTIONS_RUNNER_INSTALLATION_ID }}"
        github_app_private_key: "{{ .ACTIONS_RUNNER_PRIVATE_KEY }}"
  data:
    - secretKey: ACTIONS_RUNNER_APP_ID
      remoteRef:
        key: /actions-runner/ACTIONS_RUNNER_APP_ID
    - secretKey: ACTIONS_RUNNER_INSTALLATION_ID
      remoteRef:
        key: /actions-runner/ACTIONS_RUNNER_INSTALLATION_ID
    - secretKey: ACTIONS_RUNNER_PRIVATE_KEY
      remoteRef:
        key: /actions-runner/ACTIONS_RUNNER_PRIVATE_KEY
