---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: echo
spec:
  dependsOn:
    - name: tinyauth-riki-boo
    - name: tinyauth-brauni-dev
    - name: tinyauth-480p-com
  interval: 1h
  path: ./kubernetes/apps/network/echo/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: network
  wait: false
