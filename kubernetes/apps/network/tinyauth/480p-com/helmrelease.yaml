---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tinyauth-480p-com
spec:
  chartRef:
    kind: OCIRepository
    name: tinyauth-480p-com
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    controllers:
      tinyauth-480p-com:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/steveiliop56/tinyauth
              tag: v5.0.0-beta.3-distroless@sha256:2de072fead288ec42daa6df48895fc62e17e09c695903121ea15ee60eb61f3eb
            env:
              TINYAUTH_APPURL: https://auth.480p.com
              TINYAUTH_DISABLEANALYTICS: true
              TINYAUTH_AUTH_SECURECOOKIE: true
              TINYAUTH_AUTH_SESSIONEXPIRY: 604800
              TINYAUTH_RESOURCESDIR: /data/resources
              TINYAUTH_DATABASEPATH: /data/tinyauth.db
              TINYAUTH_AUTH_TRUSTEDPROXIES: 10.42.0.0/16
            envFrom:
              - secretRef:
                  name: tinyauth-480p-com-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthz
                    port: &port 3000
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: tinyauth-480p-com
        ports:
          http:
            port: *port
    route:
      480p-com:
        hostnames:
          - auth.480p.com
        parentRefs:
          - name: envoy-480p-com-public
            namespace: network
            sectionName: https
    persistence:
      data:
        type: emptyDir
        advancedMounts:
          tinyauth-480p-com:
            app:
              - path: /data
