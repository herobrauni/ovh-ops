---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tinyauth-riki-boo
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: tinyauth-riki-boo-secret
    template:
      data:
        SECRET: "{{ .SECRET }}"
        USERS: "{{ .USERS }}"
        TINYAUTH_AUTH_USERS: "{{ .USERS }}"
  data:
    - secretKey: SECRET
      remoteRef:
        key: /tinyauth/SECRET
    - secretKey: USERS
      remoteRef:
        key: /tinyauth/USERS
