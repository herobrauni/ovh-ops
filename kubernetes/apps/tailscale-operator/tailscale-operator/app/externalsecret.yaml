---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth-client
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: oauth-client
    template:
      data:
        client_id: "{{ .client_id }}"
        client_secret: "{{ .client_secret }}"
  data:
    - secretKey: client_id
      remoteRef:
        key: /tailscale-operator/client_id
    - secretKey: client_secret
      remoteRef:
        key: /tailscale-operator/client_secret
