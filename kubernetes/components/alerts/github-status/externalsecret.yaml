---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-status-token
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: github-status-token-secret
    template:
      data:
        token: "{{ .FLUX_GITHUB_TOKEN }}"
  data:
    - secretKey: FLUX_GITHUB_TOKEN
      remoteRef:
        key: /flux/FLUX_GITHUB_TOKEN
