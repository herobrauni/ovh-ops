---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "${APP}-pg-backups-volsync"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  target:
    name: "${APP}-pg-backups-volsync-secret"
    template:
      data:
        KOPIA_REPOSITORY: "{{ .KOPIA_REPOSITORY }}"
        KOPIA_PASSWORD: "{{ .KOPIA_PASSWORD }}"
        SFTP_HOST: "{{ .SFTP_HOST }}"
        SFTP_PORT: "{{ .SFTP_PORT }}"
        SFTP_USERNAME: "{{ .SFTP_USERNAME }}"
        SFTP_PATH: "{{ .SFTP_PATH }}"
        SFTP_KEY_FILE: "{{ .SFTP_KEY_FILE }}"
        SFTP_KNOWN_HOSTS_DATA: |-
          {{ .SFTP_KNOWN_HOSTS_DATA | replace "\\n" "\n" | replace " [" "\n[" }}
  dataFrom:
    - extract:
        key: volsync-template
    - extract:
        key: kopia_known_hosts
