---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "${APP}-initdb"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: "${APP}-initdb-secret"
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        INIT_POSTGRES_DBNAME: ${APP}
        INIT_POSTGRES_HOST: ${CNPG_NAME:=postgres18}-rw.dbms.svc.cluster.local
        INIT_POSTGRES_USER: "{{ .postgres_username }}"
        INIT_POSTGRES_PASS: "{{ .postgres_password }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .password }}"
  data:
    - secretKey: postgres_username
      remoteRef:
        key: /${CNPG_SECRET_FOLDER}/${CNPG_SECRET_FOLDER}_POSTGRES_USERNAME
    - secretKey: postgres_password
      remoteRef:
        key: /${CNPG_SECRET_FOLDER}/${CNPG_SECRET_FOLDER}_POSTGRES_PASSWORD
    - secretKey: password
      remoteRef:
        key: /cloudnative-pg/password
---
# yaml-language-server: $schema=https://kubernetes-schemas.brauni.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "${APP}-pguser"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: "${APP}-pguser-secret"
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        port: "5432"
        host: ${CNPG_NAME:=postgres18}-rw.dbms.svc.cluster.local
        ro_host: ${CNPG_NAME:=postgres18}-ro.dbms.svc.cluster.local
        user: "{{ .postgres_username }}"
        password: "{{ .postgres_password }}"
        db: "${APP}"
        uri: 'postgresql://${APP}:{{ .postgres_password }}@${CNPG_NAME:=postgres18}-rw.dbms.svc.cluster.local:5432/${APP}'
        uri_no_ssl: 'postgresql://${APP}:{{ .postgres_password }}@${CNPG_NAME:=postgres18}-rw.dbms.svc.cluster.local:5432/${APP}?sslmode=disable'
        async_uri: 'postgresql+asyncpg://${APP}:{{ .postgres_password }}@${CNPG_NAME:=postgres18}-rw.dbms.svc.cluster.local:5432/${APP}'
        async_uri_no_ssl: 'postgresql+asyncpg://${APP}:{{ .postgres_password }}@${CNPG_NAME:=postgres18}-rw.dbms.svc.cluster.local:5432/${APP}?sslmode=disable'
        dsn: 'host=${CNPG_NAME:=postgres18}-rw.dbms.svc.cluster.local port=5432 user={{ .postgres_username }} password={{ .postgres_password }} dbname=${APP} sslmode=disable'
  data:
    - secretKey: postgres_username
      remoteRef:
        key: /${CNPG_SECRET_FOLDER}/${CNPG_SECRET_FOLDER}_POSTGRES_USERNAME
    - secretKey: postgres_password
      remoteRef:
        key: /${CNPG_SECRET_FOLDER}/${CNPG_SECRET_FOLDER}_POSTGRES_PASSWORD
