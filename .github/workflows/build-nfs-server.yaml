---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build NFS Server

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-nfs-server.yaml
      - infra/nfs-server/**

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c904b1327438a1e7fa842aee2e2f # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0797b2dc7e1 # v3.11.1

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c1e5ce72c0d4e702b9307b69fcf631b4b7034eb8 # v5.8.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/nfs-server
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198571cfb76cef # v6.18.0
        with:
          context: ./infra/nfs-server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
